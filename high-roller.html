<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VegasSidekick.com/NeonDesert</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050510;font-family:'Helvetica Neue',Arial,sans-serif}
#canvas{display:block;width:100vw;height:100vh}

#time-display{
  position:fixed;top:20px;left:20px;color:#fff;z-index:100;pointer-events:none;
  text-shadow:0 1px 10px rgba(0,0,0,0.95)
}
#time-display .city{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;opacity:0.55;margin-bottom:2px}
#time-display .clock{font-size:21px;font-weight:300;letter-spacing:0.5px}

#watermark{
  position:fixed;top:19px;left:50%;transform:translateX(-50%);
  color:rgba(255,107,43,0.22);font-size:10px;letter-spacing:6px;
  text-transform:uppercase;font-weight:400;pointer-events:none;z-index:100;white-space:nowrap
}

#controls{
  position:fixed;top:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:100
}
.btn{
  background:rgba(5,5,20,0.78);border:1px solid rgba(255,255,255,0.16);
  color:rgba(255,255,255,0.82);padding:9px 16px;border-radius:6px;cursor:pointer;
  font-size:12px;font-family:inherit;letter-spacing:0.4px;backdrop-filter:blur(10px);
  transition:background 0.2s,border-color 0.2s,color 0.2s;text-align:left;white-space:nowrap
}
.btn:hover{background:rgba(255,107,43,0.28);border-color:rgba(255,107,43,0.65);color:#fff}
.btn.active{background:rgba(255,107,43,0.38);border-color:#FF6B2B;color:#fff}

#footer{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  color:#FF6B2B;font-size:12px;letter-spacing:1.5px;opacity:0;
  animation:fadeUp 1.5s ease 2.2s forwards;pointer-events:none;z-index:100;
  text-shadow:0 0 18px rgba(255,107,43,0.55);white-space:nowrap
}
@keyframes fadeUp{
  from{opacity:0;transform:translateX(-50%) translateY(10px)}
  to{opacity:0.88;transform:translateX(-50%) translateY(0)}
}

#loading{
  position:fixed;inset:0;background:#050510;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;z-index:999;
  transition:opacity 1s ease
}
#loading.fade{opacity:0;pointer-events:none}
.ld-title{color:#FF6B2B;font-size:28px;letter-spacing:8px;font-weight:300;
  text-transform:uppercase;text-shadow:0 0 40px rgba(255,107,43,0.5)}
.ld-sub{color:rgba(255,255,255,0.28);font-size:10px;letter-spacing:4px;text-transform:uppercase}

@media(max-width:768px){
  #controls{top:auto;bottom:52px;right:12px;flex-direction:row;flex-wrap:wrap;
    justify-content:flex-end;max-width:calc(100vw - 24px)}
  .btn{padding:7px 10px;font-size:11px}
  #time-display{top:12px;left:12px}
  #footer{font-size:11px;bottom:8px}
}
</style>
</head>
<body>

<div id="loading">
  <div class="ld-title">NEON DESERT</div>
  <div class="ld-sub">VegasSidekick.com/NeonDesert</div>
</div>

<canvas id="canvas"></canvas>

<div id="time-display">
  <div class="city">Las Vegas</div>
  <div class="clock" id="clock-text">—</div>
</div>

<div id="watermark">NEON DESERT</div>

<div id="controls">
  <button class="btn" id="btn-tour"   onclick="toggleAutoTour()">▶ Auto Tour</button>
  <button class="btn" id="btn-cin"    onclick="toggleCinematic()">✦ Cinematic</button>
  <button class="btn" id="btn-lights" onclick="toggleLights()">💡 Toggle Lights</button>
  <button class="btn" id="btn-reset"  onclick="resetCamera()">↺ Reset</button>
</div>

<div id="footer">🌵 VegasSidekick.com/NeonDesert</div>

<!-- Three.js r128 + post-processing -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
'use strict';

// ─── Config ──────────────────────────────────────────────────────────────────
const IS_MOBILE = window.innerWidth < 768;

// ─── Renderer ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({
  canvas, antialias: !IS_MOBILE, powerPreference: 'high-performance'
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, IS_MOBILE ? 1.5 : 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = !IS_MOBILE;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.2;

// ─── Scene ────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050510, 0.0012);

// ─── Camera ───────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
const CAM_DEFAULT = new THREE.Vector3(28, 6, 28);
camera.position.copy(CAM_DEFAULT);

// ─── OrbitControls ────────────────────────────────────────────────────────────
const controls = new THREE.OrbitControls(camera, canvas);
controls.target.set(0, 2, 0);
controls.minDistance = 8;
controls.maxDistance = 90;
controls.maxPolarAngle = Math.PI * 0.49;
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.update();

// ─── Post-processing ──────────────────────────────────────────────────────────
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));

const bloomPass = new THREE.UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.8, 0.5, 0.82
);
composer.addPass(bloomPass);

// ─── Las Vegas time helpers ───────────────────────────────────────────────────
const LV_TZ = 'America/Los_Angeles';

function getLVHour() {
  return parseInt(
    new Intl.DateTimeFormat('en-US', { timeZone: LV_TZ, hour: 'numeric', hour12: false }).format(new Date()),
    10
  );
}
function getLVTimeStr() {
  return new Intl.DateTimeFormat('en-US', {
    timeZone: LV_TZ, hour: 'numeric', minute: '2-digit', hour12: true
  }).format(new Date());
}
function getTODPhase(h) {
  if (h >= 6  && h < 8)  return 'sunrise';
  if (h >= 8  && h < 17) return 'day';
  if (h >= 17 && h < 19) return 'golden';
  if (h >= 19 && h < 21) return 'dusk';
  return 'night';
}

// ─── Scene lights ─────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xfff5dd, 1.5);
sunLight.position.set(60, 80, 30);
if (!IS_MOBILE) {
  sunLight.castShadow = true;
  sunLight.shadow.mapSize.set(2048, 2048);
  sunLight.shadow.camera.near = 1;
  sunLight.shadow.camera.far = 400;
  const sc = sunLight.shadow.camera;
  sc.left = sc.bottom = -70; sc.right = sc.top = 70;
  sunLight.shadow.bias = -0.0005;
}
scene.add(sunLight);

const hubGlow = new THREE.PointLight(0xfff5cc, 2.5, 22);
hubGlow.position.set(0, 0, 1.5);
scene.add(hubGlow);

// Dim moon-like fill light, active at night
const moonLight = new THREE.DirectionalLight(0x8899cc, 0.0);
moonLight.position.set(-40, 60, -30);
scene.add(moonLight);

// ─── Sky sphere (inverted, gradient shader) ───────────────────────────────────
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: {
    uTop:  { value: new THREE.Color(0x020208) },
    uHori: { value: new THREE.Color(0x080820) }
  },
  vertexShader: `
    varying float vY;
    void main() {
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vY = wp.y;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    uniform vec3 uTop;
    uniform vec3 uHori;
    varying float vY;
    void main() {
      float t = pow(clamp(vY / 700.0, 0.0, 1.0), 0.45);
      gl_FragColor = vec4(mix(uHori, uTop, t), 1.0);
    }
  `
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(900, 32, 16), skyMat));

// ─── Stars ────────────────────────────────────────────────────────────────────
const STAR_N = IS_MOBILE ? 1200 : 2500;
const starPos = new Float32Array(STAR_N * 3);
for (let i = 0; i < STAR_N; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(Math.random() * 0.85);
  const r     = 750 + Math.random() * 50;
  starPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  starPos[i*3+1] = r * Math.cos(phi);
  starPos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({
  color: 0xffffff, size: 1.4, transparent: true, opacity: 0, sizeAttenuation: true
});
scene.add(new THREE.Points(starGeo, starMat));

// ─── Ground ───────────────────────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(1200, 1200),
  new THREE.MeshLambertMaterial({ color: 0xc4a882 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -13;
ground.receiveShadow = !IS_MOBILE;
scene.add(ground);

// ─── Wheel assembly ───────────────────────────────────────────────────────────
const wheelGroup = new THREE.Group();
scene.add(wheelGroup);

// Rim
const rimMat = new THREE.MeshStandardMaterial({
  color: 0x778899,
  emissive: new THREE.Color(0x1133bb),
  emissiveIntensity: 0.35,
  metalness: 0.85,
  roughness: 0.25
});
wheelGroup.add(new THREE.Mesh(new THREE.TorusGeometry(12, 0.15, 16, 200), rimMat));

// Hub — cylinder along Z axis
const hubMat = new THREE.MeshStandardMaterial({
  color: 0xaabbcc, emissive: new THREE.Color(0x4466dd),
  emissiveIntensity: 0.5, metalness: 0.9, roughness: 0.15
});
const hubMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 1.8, 32), hubMat);
hubMesh.rotation.x = Math.PI / 2;
wheelGroup.add(hubMesh);

// 28 spokes
const spokeMat = new THREE.MeshStandardMaterial({ color: 0x8899aa, metalness: 0.7, roughness: 0.4 });
for (let i = 0; i < 28; i++) {
  const a = (i / 28) * Math.PI * 2;
  const spoke = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 12, 6), spokeMat);
  spoke.position.set(Math.cos(a) * 6, Math.sin(a) * 6, 0);
  spoke.rotation.z = a - Math.PI / 2;
  wheelGroup.add(spoke);
}

// Tripod supports — 3 thick cylinders from hub to ground (static, not in wheelGroup)
const supportMat = new THREE.MeshStandardMaterial({ color: 0x556677, metalness: 0.65, roughness: 0.5 });
[0, (2*Math.PI/3), (4*Math.PI/3)].forEach(a => {
  const top = new THREE.Vector3(0, 0, 0);
  const bot = new THREE.Vector3(Math.cos(a) * 7, -13, Math.sin(a) * 7);
  const dir = new THREE.Vector3().subVectors(top, bot).normalize();
  const len = top.distanceTo(bot);
  const mid = new THREE.Vector3().lerpVectors(top, bot, 0.5);
  const sup = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.28, len, 8), supportMat);
  sup.position.copy(mid);
  sup.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
  if (!IS_MOBILE) sup.castShadow = true;
  scene.add(sup); // added to scene, not wheelGroup — legs stay still
});

// ─── Pods (in world space so they stay upright) ───────────────────────────────
const POD_N = 28;
const POD_COLORS = [
  new THREE.Color(0.55, 0.0,  1.0),  // purple
  new THREE.Color(0.0,  0.35, 1.0),  // blue
  new THREE.Color(1.0,  0.1,  0.65), // pink
  new THREE.Color(1.0,  0.0,  0.85), // magenta
];
const _tc = new THREE.Color();

const pods = [];
const podLightEvery = IS_MOBILE ? 2 : 1;

for (let i = 0; i < POD_N; i++) {
  const baseAngle = (i / POD_N) * Math.PI * 2;

  const mat = new THREE.MeshStandardMaterial({
    color: 0x223344,
    emissive: POD_COLORS[0].clone(),
    emissiveIntensity: 1.2,
    roughness: 0.25,
    metalness: 0.55
  });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.45, 16, 12), mat);
  mesh.position.set(Math.cos(baseAngle) * 12, Math.sin(baseAngle) * 12, 0);
  scene.add(mesh);

  let light = null;
  if (i % podLightEvery === 0) {
    light = new THREE.PointLight(0xaa00ff, 0.9, 6);
    light.position.copy(mesh.position);
    scene.add(light);
  }

  pods.push({ mesh, light, baseAngle, phase: i / POD_N });
}

// ─── Palm trees ───────────────────────────────────────────────────────────────
function makePalm(x, z, hScale) {
  const g = new THREE.Group();
  g.position.set(x, -13, z);
  const h = (8 + Math.random() * 4) * hScale;

  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.10, 0.22, h, 8),
    new THREE.MeshLambertMaterial({ color: 0x8B6914 })
  );
  trunk.position.y = h / 2;
  if (!IS_MOBILE) trunk.castShadow = true;
  g.add(trunk);

  const frondMat = new THREE.MeshLambertMaterial({ color: 0x2d7a2d, side: THREE.DoubleSide });
  const nFronds  = 6 + Math.floor(Math.random() * 3);
  for (let j = 0; j < nFronds; j++) {
    const fa  = (j / nFronds) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
    const fLen = 1.8 + Math.random() * 0.8;
    const frond = new THREE.Mesh(
      new THREE.BoxGeometry(0.07, 0.07, 2.4 + Math.random() * 1.2),
      frondMat
    );
    frond.position.set(
      Math.cos(fa) * fLen,
      h - 0.2 + Math.sin(j * 0.7) * 0.3,
      Math.sin(fa) * fLen
    );
    frond.rotation.y = -fa + Math.PI / 2;
    frond.rotation.x = -(0.35 + Math.random() * 0.3);
    g.add(frond);
  }
  return g;
}

[[-18,-8,0.95],[18,-12,1.0],[-15,11,0.9],[20,9,1.05],
 [-22,3,0.85],[15,-20,1.1],[-10,19,0.92],[24,1,1.0]]
.forEach(([x,z,h]) => scene.add(makePalm(x, z, h)));

// ─── Background buildings (LINQ-style) ───────────────────────────────────────
function makeBuilding(x, z, w, d, bh, col) {
  const grp = new THREE.Group();
  const bMesh = new THREE.Mesh(
    new THREE.BoxGeometry(w, bh, d),
    new THREE.MeshStandardMaterial({ color: col, roughness: 0.85, metalness: 0.2 })
  );
  bMesh.position.set(x, -13 + bh / 2, z);
  if (!IS_MOBILE) { bMesh.castShadow = true; bMesh.receiveShadow = true; }
  grp.add(bMesh);

  // Emissive window grid
  const winMat = new THREE.MeshStandardMaterial({
    color: 0xffffcc, emissive: 0xffffaa, emissiveIntensity: 1.6
  });
  const rows = 4 + Math.floor(Math.random() * 5);
  const cols = 3 + Math.floor(Math.random() * 4);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (Math.random() < 0.65) {
        const wm = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.15), winMat);
        wm.position.set(
          x + (c / (cols - 1) - 0.5) * w * 0.72,
          -13 + bh * 0.1 + (r / (rows - 1)) * bh * 0.8,
          z - d / 2 - 0.08
        );
        grp.add(wm);
      }
    }
  }
  scene.add(grp);
}

[[-60,-80,20,15,42,0x6688aa],[-32,-90,28,18,58,0x7799bb],
 [6,-95,20,14,36,0x558899],[38,-85,24,16,50,0x667788],
 [65,-75,30,20,40,0x5577aa],[-85,-68,16,12,30,0x446688],
 [85,-62,18,13,34,0x557799]]
.forEach(a => makeBuilding(...a));

// ─── Time-of-day state & apply ────────────────────────────────────────────────
const todState = { rimBase: 0.35, podGlow: 0.08 };
let lightOverride = null; // null | 'night' | 'day'

function applyTOD(phase) {
  const n  = phase === 'night';
  const d  = phase === 'dusk';
  const g  = phase === 'golden';
  const s  = phase === 'sunrise';
  const dy = phase === 'day';

  // Sky gradient
  if (dy) {
    skyMat.uniforms.uTop.value.set(0x1a6bdc);
    skyMat.uniforms.uHori.value.set(0x87ceeb);
  } else if (s) {
    skyMat.uniforms.uTop.value.set(0x2233aa);
    skyMat.uniforms.uHori.value.set(0xff7733);
  } else if (g) {
    skyMat.uniforms.uTop.value.set(0x1a2299);
    skyMat.uniforms.uHori.value.set(0xff8833);
  } else if (d) {
    skyMat.uniforms.uTop.value.set(0x0d0d66);
    skyMat.uniforms.uHori.value.set(0x2233aa);
  } else {
    skyMat.uniforms.uTop.value.set(0x050514);
    skyMat.uniforms.uHori.value.set(0x121230);
  }

  // Sun & ambient
  sunLight.intensity = dy ? 2.2 : s ? 0.9 : g ? 1.3 : d ? 0.4 : 0.0;
  sunLight.color.setHex(dy ? 0xffffff : s ? 0xff8844 : g ? 0xffbb44 : d ? 0x6688cc : 0x111122);
  ambientLight.intensity = dy ? 0.55 : s ? 0.3 : g ? 0.35 : d ? 0.25 : 0.5;
  ambientLight.color.setHex(dy ? 0x8899cc : s ? 0xdd8866 : g ? 0xcc9944 : d ? 0x445577 : 0x5566aa);
  // Moon fill at night
  moonLight.intensity = n ? 0.35 : d ? 0.1 : 0.0;

  // Stars
  starMat.opacity = n ? 1.0 : d ? 0.35 : 0.0;

  // Bloom
  bloomPass.strength = n ? (IS_MOBILE ? 1.0 : 2.2) : (d || g) ? (IS_MOBILE ? 0.5 : 1.1) : (IS_MOBILE ? 0.15 : 0.45);

  // Pod brightness
  todState.podGlow = n ? 1.3 : (d || g) ? 0.65 : 0.08;
  pods.forEach(p => {
    if (p.light) p.light.intensity = todState.podGlow;
    p.mesh.material.emissiveIntensity = n ? 1.4 : (d || g) ? 0.9 : 0.18;
  });

  // Rim
  todState.rimBase = n ? 0.45 : (d || g) ? 0.28 : 0.06;
  rimMat.emissiveIntensity = todState.rimBase;
  rimMat.emissive.setHex(n ? 0x2244ff : 0x1122aa);

  // Fog
  scene.fog.color.setHex(n ? 0x0d0d28 : dy ? 0xaaddff : 0x1a1a4e);
}

// ─── Camera modes ─────────────────────────────────────────────────────────────
let autoTourOn = false, cinematicOn = false;
let tourT = 0, cinT = 0;

function toggleAutoTour() {
  autoTourOn = !autoTourOn; cinematicOn = false; tourT = 0;
  controls.enabled = !autoTourOn;
  document.getElementById('btn-tour').classList.toggle('active', autoTourOn);
  document.getElementById('btn-cin').classList.remove('active');
}
function toggleCinematic() {
  cinematicOn = !cinematicOn; autoTourOn = false; cinT = 0;
  controls.enabled = !cinematicOn;
  document.getElementById('btn-cin').classList.toggle('active', cinematicOn);
  document.getElementById('btn-tour').classList.remove('active');
}
function toggleLights() {
  lightOverride = lightOverride === null ? 'night' : lightOverride === 'night' ? 'day' : null;
  applyTOD(lightOverride !== null ? lightOverride : getTODPhase(getLVHour()));
}
function resetCamera() {
  autoTourOn = cinematicOn = false;
  controls.enabled = true;
  camera.position.copy(CAM_DEFAULT);
  controls.target.set(0, 2, 0);
  controls.update();
  document.getElementById('btn-tour').classList.remove('active');
  document.getElementById('btn-cin').classList.remove('active');
}

// ─── Animation loop ───────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let wheelAngle = 0;
const WHEEL_SPEED = (Math.PI * 2) / 90; // one rotation per 90 seconds

// Boot
applyTOD(getTODPhase(getLVHour()));
document.getElementById('clock-text').textContent = getLVTimeStr();
setInterval(() => { document.getElementById('clock-text').textContent = getLVTimeStr(); }, 15000);

let lastTODCheck = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt   = clock.getDelta();
  const time = clock.getElapsedTime();

  // Periodic auto TOD refresh
  if (lightOverride === null && time - lastTODCheck > 60) {
    lastTODCheck = time;
    applyTOD(getTODPhase(getLVHour()));
  }

  // Wheel rotation
  wheelAngle += dt * WHEEL_SPEED;
  wheelGroup.rotation.z = wheelAngle;

  // Pods: world-space positions (stay upright) + color cycling
  pods.forEach(pod => {
    const wa = pod.baseAngle + wheelAngle;
    pod.mesh.position.set(Math.cos(wa) * 12, Math.sin(wa) * 12, 0);
    if (pod.light) pod.light.position.copy(pod.mesh.position);

    // Color ripple: 0.2 cycles/sec, staggered by phase
    const t  = ((time * 0.2) + pod.phase) % 1.0;
    const ci = Math.floor(t * 4) % 4;
    const cf = (t * 4) % 1.0;
    _tc.copy(POD_COLORS[ci]).lerp(POD_COLORS[(ci + 1) % 4], cf);
    pod.mesh.material.emissive.copy(_tc);
    if (pod.light) pod.light.color.copy(_tc);
  });

  // Rim pulse
  rimMat.emissiveIntensity = todState.rimBase * (0.75 + 0.5 * Math.sin(time * 1.7));

  // Hub pulse
  hubGlow.intensity = 2.0 + Math.sin(time * 2.3) * 0.6;

  // Auto tour: gentle orbit with zoom variation
  if (autoTourOn) {
    tourT += dt;
    const r = 30 + Math.sin(tourT * 0.18) * 12;
    const a = tourT * 0.22;
    const y = 5 + Math.sin(tourT * 0.14) * 10;
    camera.position.set(Math.cos(a) * r, y, Math.sin(a) * r);
    camera.lookAt(0, 4, 0);
  }

  // Cinematic: dramatic low angle looking up
  if (cinematicOn) {
    cinT += dt;
    const a = cinT * 0.09;
    camera.position.set(Math.cos(a) * 22, -10, Math.sin(a) * 22);
    camera.lookAt(0, 12, 0);
  }

  if (!autoTourOn && !cinematicOn) controls.update();
  composer.render();
}

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
});

// ─── Hide loading screen ──────────────────────────────────────────────────────
window.addEventListener('load', () => {
  setTimeout(() => {
    const ld = document.getElementById('loading');
    ld.classList.add('fade');
    setTimeout(() => ld.remove(), 1100);
  }, 1000);
});

animate();
</script>
</body>
</html>
