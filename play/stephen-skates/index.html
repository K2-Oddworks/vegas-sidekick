<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#000;font-family:'Barlow Condensed',sans-serif;}
  body{display:flex;align-items:center;justify-content:center;touch-action:none;}
  #wrap{position:relative;width:100vw;height:100vh;max-width:520px;max-height:100vh;overflow:hidden;background:#000;}
  canvas{display:block;width:100%;height:calc(100% - 52px);position:absolute;top:52px;left:0;image-rendering:auto;}

  /* ===== TITLE SCREEN ===== */
  #title{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 40%, #12213f 0%, #05070f 70%, #000 100%);cursor:pointer;}
  #title.hide{display:none;}
  #stars{position:absolute;inset:0;pointer-events:none;}
  #floatBox{position:relative;width:230px;height:300px;display:flex;align-items:center;justify-content:center;
    filter:drop-shadow(0 0 34px rgba(200,164,73,.55)) drop-shadow(0 0 70px rgba(0,90,255,.35));}
  #floatImg{width:170px;animation:bob 3.4s ease-in-out infinite;transform-origin:50% 85%;}
  @keyframes bob{
    0%{transform:translateY(0) rotate(-5deg) scale(1);}
    25%{transform:translateY(-16px) rotate(3deg) scale(1.02);}
    50%{transform:translateY(-4px) rotate(6deg) scale(1);}
    75%{transform:translateY(-20px) rotate(-2deg) scale(1.03);}
    100%{transform:translateY(0) rotate(-5deg) scale(1);}
  }
  #shadow{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:120px;height:16px;border-radius:50%;
    background:radial-gradient(ellipse,rgba(200,164,73,.5),transparent 70%);animation:shd 3.4s ease-in-out infinite;}
  @keyframes shd{0%,100%{transform:translateX(-50%) scale(1);opacity:.5;}50%{transform:translateX(-50%) scale(.7);opacity:.25;}}
  h1{font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:clamp(44px,13vw,72px);letter-spacing:2px;line-height:.9;text-align:center;
    background:linear-gradient(180deg,#F5E3A3 0%,#C8A449 55%,#8a6d24 100%);-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 40px rgba(200,164,73,.25);}
  .sub{font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:clamp(15px,4.4vw,20px);letter-spacing:5px;color:#1A6BFF;margin-top:6px;
    text-shadow:0 0 18px rgba(26,107,255,.8);}
  #tapline{margin-top:26px;font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:20px;letter-spacing:3px;color:#fff;opacity:.85;
    animation:blink 1.15s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:.25;}50%{opacity:1;}}
  #hint{margin-top:10px;font-size:14px;letter-spacing:1px;color:#7d8aa5;text-align:center;padding:0 24px;}
  #best{position:absolute;top:16px;right:16px;font-family:'Barlow Condensed',sans-serif;font-weight:800;color:#C8A449;font-size:16px;letter-spacing:1px;}

  /* ===== HUD ===== */
  #hud{position:absolute;top:0;left:0;right:0;height:52px;z-index:10;display:flex;justify-content:space-between;align-items:center;
    padding:6px 14px;pointer-events:none;
    background:#05070f;border-bottom:1px solid rgba(255,43,209,.35);}
  .stat{font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:12px;letter-spacing:2px;color:#7d8aa5;line-height:1;}
  .val{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:26px;line-height:1;color:#fff;}
  .gold{color:#C8A449;}
  .blue{color:#1A6BFF;}
  #lives{display:flex;gap:4px;margin-top:3px;}
  .life{width:11px;height:11px;border-radius:50%;background:#C8A449;box-shadow:0 0 8px rgba(200,164,73,.9);}
  .life.dead{background:#26304a;box-shadow:none;}

  /* ===== FLASH / TOAST ===== */
  #toast{position:absolute;top:44%;left:50%;transform:translate(-50%,-50%) scale(.6);z-index:15;
    font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:54px;letter-spacing:3px;color:#fff;opacity:0;pointer-events:none;
    text-shadow:0 0 26px rgba(0,0,0,.95);white-space:nowrap;}
  #toast.show{animation:pop 1s ease-out forwards;}
  @keyframes pop{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.6);}
    18%{opacity:1;transform:translate(-50%,-50%) scale(1.12);}
    72%{opacity:1;transform:translate(-50%,-50%) scale(1);}
    100%{opacity:0;transform:translate(-50%,-80%) scale(1);}
  }

  /* ===== GAME OVER ===== */
  #over{position:absolute;inset:0;z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(2,4,10,.93);backdrop-filter:blur(6px);}
  #over.show{display:flex;}
  #over h2{font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:clamp(50px,15vw,84px);letter-spacing:2px;line-height:.9;
    background:linear-gradient(180deg,#fff,#C8A449);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .row{display:flex;gap:38px;margin-top:22px;}
  .row div{text-align:center;}
  #again{margin-top:32px;padding:14px 44px;border:2px solid #C8A449;border-radius:4px;background:transparent;
    font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;font-size:24px;letter-spacing:3px;color:#C8A449;cursor:pointer;
    transition:.18s;position:relative;overflow:hidden;}
  #again:active{background:#C8A449;color:#05070f;transform:scale(.96);}
  #newbest{margin-top:14px;font-family:'Bebas Neue','Arial Narrow',Impact,sans-serif;letter-spacing:3px;color:#1A6BFF;font-size:19px;display:none;
    text-shadow:0 0 16px rgba(26,107,255,.9);}
  #newbest.show{display:block;animation:blink 1s infinite;}
  #cactus{position:absolute;bottom:9px;right:11px;font-size:13px;opacity:.28;z-index:40;pointer-events:none;}
  #sound{position:absolute;top:60px;right:10px;z-index:12;font-size:17px;opacity:.45;cursor:pointer;pointer-events:auto;}
</style>
</head>

<div id="wrap">
  <canvas id="cv"></canvas>

  <div id="hud">
    <div><div class="stat">SCORE</div><div class="val" id="score">0</div></div>
    <div style="text-align:center"><div class="stat">LEVEL</div><div class="val gold" id="level">1</div></div>
    <div style="text-align:right"><div class="stat">LIVES</div><div id="lives"></div></div>
  </div>
  <div id="sound">🔊</div>
  <div id="toast"></div>

  <div id="title">
    <canvas id="stars"></canvas>
    <div id="best"></div>
    <div id="floatBox">
      <img id="floatImg" alt="Stephen">
      <div id="shadow"></div>
    </div>
    <h1>STEPHEN<br>SKATES</h1>
    <div class="sub">VEGAS CROSSING</div>
    <div id="tapline">TAP TO DROP IN</div>
    <div id="hint">Swipe or arrow keys · Get to T-MOBILE ARENA · Fill all 5 gates</div>
  </div>

  <div id="over">
    <h2>YOU'RE<br>DONE</h2>
    <div class="row">
      <div><div class="stat">SCORE</div><div class="val gold" id="fScore">0</div></div>
      <div><div class="stat">LEVEL</div><div class="val blue" id="fLevel">1</div></div>
      <div><div class="stat">BEST</div><div class="val" id="fBest">0</div></div>
    </div>
    <div id="newbest">NEW PERSONAL BEST</div>
    <button id="again">SKATE AGAIN</button>
  </div>

  <div id="cactus">🌵</div>
</div>

/* ---------- palette ---------- */
const GOLD='#C8A449', GOLD_HI='#F5E3A3', BLUE='#1A6BFF', DODGER='#005A9C', INK='#05070f';
const MAG='#FF2BD1', MAG_HI='#FF8AE8', MAG_DEEP='#8a0f6e';

/* ---------- dom ---------- */
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const titleEl=document.getElementById('title'), overEl=document.getElementById('over');
const toastEl=document.getElementById('toast'), soundBtn=document.getElementById('sound');
const scoreEl=document.getElementById('score'), levelEl=document.getElementById('level'), livesEl=document.getElementById('lives');
document.getElementById('floatImg').src=SPRITE_SRC;

const sprite=new Image(); sprite.src=SPRITE_SRC; let spriteOK=false;
sprite.onload=()=>spriteOK=true;

/* ---------- canvas sizing (logical grid) ---------- */
let W=0,H=0,DPR=1;
const COLS=9;          // horizontal cells
const ROWS=13.6;       // arena band (1.6) + 11 play rows + 1 start row
const ARENA_H=1.6;     // arena band height in cell units
let CW=0, CH=0;        // cell size

function rowY(r){ return (ARENA_H + (r-1))*CH; }
const HUD_H=52;
function resize(){
  const r=cv.parentElement.getBoundingClientRect();
  DPR=Math.min(window.devicePixelRatio||1,2.5);
  W=r.width; H=Math.max(240, r.height-HUD_H);
  cv.width=W*DPR; cv.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  CW=W/COLS; CH=H/ROWS;
  const sc=document.getElementById('stars');
  sc.width=r.width; sc.height=r.height;
  drawStars();
}
window.addEventListener('resize',resize);

/* ---------- title starfield ---------- */
function drawStars(){
  const c=document.getElementById('stars'), x=c.getContext('2d');
  x.clearRect(0,0,c.width,c.height);
  for(let i=0;i<90;i++){
    const px=Math.random()*c.width, py=Math.random()*c.height*.8, r=Math.random()*1.5+.3;
    x.globalAlpha=Math.random()*.7+.15;
    x.fillStyle= Math.random()>.82 ? GOLD : '#fff';
    x.beginPath(); x.arc(px,py,r,0,7); x.fill();
  }
  x.globalAlpha=1;
}

/* ---------- audio: WebAudio SFX + Speech ---------- */
let AC=null, soundOn=true;
function ac(){ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended')AC.resume(); return AC; }
function beep(f,dur,type='square',vol=.16,slide=0){
  if(!soundOn) return;
  try{
    const a=ac(), o=a.createOscillator(), g=a.createGain();
    o.type=type; o.frequency.setValueAtTime(f,a.currentTime);
    if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(40,f+slide), a.currentTime+dur);
    g.gain.setValueAtTime(vol,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+dur);
    o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+dur);
  }catch(e){}
}
function noise(dur=.3,vol=.22){
  if(!soundOn) return;
  try{
    const a=ac(), n=a.sampleRate*dur, buf=a.createBuffer(1,n,a.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const s=a.createBufferSource(); s.buffer=buf;
    const g=a.createGain(); g.gain.setValueAtTime(vol,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+dur);
    const f=a.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1100;
    s.connect(f); f.connect(g); g.connect(a.destination); s.start();
  }catch(e){}
}
let voices=[];
function loadVoices(){ voices=window.speechSynthesis? speechSynthesis.getVoices():[]; }
loadVoices();
if(window.speechSynthesis) speechSynthesis.onvoiceschanged=loadVoices;
function say(text,rate=1,pitch=1){
  if(!soundOn||!window.speechSynthesis) return;
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    const v=voices.find(v=>/en-US/i.test(v.lang)&&/male|david|alex|fred|daniel/i.test(v.name))
          ||voices.find(v=>/en/i.test(v.lang))||voices[0];
    if(v)u.voice=v;
    u.rate=rate; u.pitch=pitch; u.volume=1;
    speechSynthesis.speak(u);
  }catch(e){}
}
soundBtn.onclick=e=>{
  e.stopPropagation();
  soundOn=!soundOn;
  soundBtn.textContent=soundOn?'🔊':'🔇';
  soundBtn.style.opacity=soundOn?.5:.25;
  if(!soundOn&&window.speechSynthesis) speechSynthesis.cancel();
};

/* ---------- game state ---------- */
const ST={ TITLE:0, PLAY:1, DEAD:2, OVER:3, WIN:4 };
let state=ST.TITLE;
let score=0, level=1, lives=3, best=+(localStorage.getItem('ss_best')||0);
let lanes=[], gates=[], player=null, deadTimer=0, winTimer=0, shake=0, particles=[], t=0;

/* ---------- obstacle types ---------- */
const TYPES=[
  {id:'spray',   w:.62,h:.42, label:'spray can'},
  {id:'bowling', w:.55,h:.55, label:'bowling ball'},
  {id:'cone',    w:.55,h:.60, label:'traffic cone'},
  {id:'dice',    w:.50,h:.50, label:'dice'},
  {id:'cab',     w:1.35,h:.62, label:'taxi'},
  {id:'zamboni', w:1.55,h:.66, label:'zamboni'},
  {id:'slushie', w:.52,h:.62, label:'slushie'},
  {id:'puck',    w:.60,h:.30, label:'hockey puck'}
];
const TMAP={}; TYPES.forEach(t=>TMAP[t.id]=t);
/* unlock pool grows with level */
function pool(){
  const p=['spray','bowling','cone'];
  if(level>=2)p.push('cab');
  if(level>=3)p.push('dice','puck');
  if(level>=4)p.push('slushie');
  if(level>=5)p.push('zamboni');
  return p;
}

/* ---------- build a level ---------- */
function buildLanes(){
  lanes=[];
  const speedMul = 1 + (level-1)*0.22;      // faster only — lane count stays fixed
  const P=pool();
  for(let r=1;r<=11;r++){
    if(r===6){ lanes.push({row:r,median:true,items:[]}); continue; }  // safe median
    const dir = r%2===0 ? 1 : -1;
    const base = (0.55 + Math.random()*0.5) * speedMul;
    const count = 2 + Math.floor(Math.random()*2) + (level>4?1:0);
    const items=[];
    const gap = COLS/count;
    for(let i=0;i<count;i++){
      const type=TMAP[P[Math.floor(Math.random()*P.length)]] || TMAP['cone'];
      items.push({ x:i*gap + Math.random()*.6, type, spin:Math.random()*7 });
    }
    lanes.push({row:r, dir, speed:base, items, median:false});
  }
}
function resetPlayer(){
  player={ col:4, row:12, px:4, py:12, hopT:1, fromC:4, fromR:12, dir:'up' };
}
function newGame(){
  score=0; level=1; lives=3; particles=[];
  gates=[false,false,false,false,false];
  buildLanes(); resetPlayer(); syncHUD();
  state=ST.PLAY;
}
function nextLevel(){
  level++; gates=[false,false,false,false,false];
  buildLanes(); resetPlayer(); syncHUD();
  beep(660,.09,'square',.16); setTimeout(()=>beep(880,.09,'square',.16),90);
  setTimeout(()=>beep(1180,.16,'square',.16),180);
  toast('LEVEL '+level, GOLD);
  state=ST.PLAY;
}
function syncHUD(){
  scoreEl.textContent=score; levelEl.textContent=level;
  livesEl.innerHTML='';
  for(let i=0;i<3;i++){
    const d=document.createElement('div');
    d.className='life'+(i<lives?'':' dead');
    livesEl.appendChild(d);
  }
}
function toast(msg,color='#fff'){
  toastEl.textContent=msg; toastEl.style.color=color;
  toastEl.classList.remove('show'); void toastEl.offsetWidth; toastEl.classList.add('show');
}

/* ---------- gate x positions ---------- */
function gateX(i){ return 0.6 + i*1.95; }   // in cell units, 5 gates across 9 cols

/* ---------- movement ---------- */
function move(dir){
  if(state!==ST.PLAY || player.hopT<1) return;
  let c=player.col, r=player.row;
  if(dir==='up')r--; else if(dir==='down')r++;
  else if(dir==='left')c--; else if(dir==='right')c++;
  if(c<0||c>COLS-1||r>12) return;

  if(r<=0){  // gate row
    let hit=-1;
    for(let i=0;i<5;i++){
      if(Math.abs(c-gateX(i))<0.75 && !gates[i]) hit=i;
    }
    if(hit<0){ return; }              // wall — no move
    gates[hit]=true;
    score+=50+level*10;
    burst(gateX(hit)*CW+CW/2, CH*0.5, GOLD, 22);
    beep(880,.07,'triangle',.18); setTimeout(()=>beep(1320,.12,'triangle',.18),70);
    toast('+'+(50+level*10), GOLD);
    resetPlayer(); syncHUD();
    if(gates.every(g=>g)){ score+=200*level; state=ST.WIN; winTimer=0; syncHUD(); }
    return;
  }
  player.fromC=player.col; player.fromR=player.row;
  player.col=c; player.row=r; player.hopT=0; player.dir=dir;
  if(dir==='up'){ score+=2; syncHUD(); }
  beep(340,.05,'square',.09,120);
}

/* ---------- input ---------- */
addEventListener('keydown',e=>{
  const k=e.key;
  if(state===ST.TITLE&&(k===' '||k==='Enter')){ start(); return; }
  if(state===ST.OVER&&(k===' '||k==='Enter')){ start(); return; }
  const m={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right',W:'up',S:'down',A:'left',D:'right'};
  if(m[k]){ e.preventDefault(); move(m[k]); }
});
let tsx=0,tsy=0,tst=0;
cv.addEventListener('touchstart',e=>{ const t0=e.changedTouches[0]; tsx=t0.clientX; tsy=t0.clientY; tst=Date.now(); },{passive:true});
cv.addEventListener('touchend',e=>{
  const t0=e.changedTouches[0], dx=t0.clientX-tsx, dy=t0.clientY-tsy;
  if(Date.now()-tst>700) return;
  if(Math.abs(dx)<22&&Math.abs(dy)<22){ move('up'); return; }   // tap = forward
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
},{passive:true});

titleEl.addEventListener('click',start);
document.getElementById('again').addEventListener('click',e=>{e.stopPropagation();start();});
function start(){
  ac(); if(window.speechSynthesis){ try{speechSynthesis.cancel();}catch(e){} }
  titleEl.classList.add('hide'); overEl.classList.remove('show');
  newGame();
}

/* ---------- particles ---------- */
function burst(x,y,color,n=16){
  for(let i=0;i<n;i++){
    particles.push({x,y,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8-2,life:1,color,r:Math.random()*3+1.5});
  }
}

/* ---------- death ---------- */
function die(){
  if(state!==ST.PLAY) return;
  lives--; syncHUD();
  shake=16;
  burst(player.px*CW+CW/2, player.py*CH+CH/2, '#ff3b30', 26);
  noise(.34,.24); beep(180,.3,'sawtooth',.14,-120);
  if(lives<=0){
    state=ST.OVER; deadTimer=0;
    say("You're done!",.92,.85);
    if(score>best){ best=score; localStorage.setItem('ss_best',best); document.getElementById('newbest').classList.add('show'); }
    else document.getElementById('newbest').classList.remove('show');
    document.getElementById('fScore').textContent=score;
    document.getElementById('fLevel').textContent=level;
    document.getElementById('fBest').textContent=best;
    setTimeout(()=>overEl.classList.add('show'),620);
  }else{
    state=ST.DEAD; deadTimer=0;
    say("Oh no!",1.05,1.1);
    toast('OH NO!', '#ff3b30');
  }
}

/* ---------- update ---------- */
function update(dt){
  t+=dt;
  if(shake>0) shake=Math.max(0,shake-dt*40);

  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=.35; p.life-=dt*1.8; });
  particles=particles.filter(p=>p.life>0);

  if(state===ST.DEAD){ deadTimer+=dt; if(deadTimer>1.0){ resetPlayer(); state=ST.PLAY; } return; }
  if(state===ST.WIN){ winTimer+=dt; if(winTimer>1.3) nextLevel(); return; }
  if(state!==ST.PLAY) return;

  // hop interp
  if(player.hopT<1){ player.hopT=Math.min(1,player.hopT+dt*7.5); }
  const e=player.hopT<1 ? 1-Math.pow(1-player.hopT,3) : 1;
  player.px = player.fromC + (player.col-player.fromC)*e;
  player.py = player.fromR + (player.row-player.fromR)*e;

  // lanes
  lanes.forEach(L=>{
    if(L.median) return;
    L.items.forEach(o=>{
      o.x += L.dir * L.speed * dt;
      o.spin += dt*(L.dir>0?4:-4);
      const w=o.type.w;
      if(L.dir>0 && o.x>COLS+w) o.x=-w-Math.random()*1.5;
      if(L.dir<0 && o.x<-w-1.5) o.x=COLS+w+Math.random()*1.5;
    });
  });

  // collision
  const L=lanes.find(l=>l.row===player.row);
  if(L && !L.median){
    const pw=.52;
    for(const o of L.items){
      const dx=Math.abs((o.x+o.type.w/2)-(player.px+.5));
      if(dx < (o.type.w+pw)/2){ die(); return; }
    }
  }
}

/* ---------- drawing helpers ---------- */
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function drawObstacle(o,cx,cy,h){
  const SZ=Math.min(CW,CH);
  ctx.save(); ctx.translate(cx,cy);
  const id=o.type.id;

  if(id==='spray'){
    const w=SZ*.30,ht=SZ*.46;
    ctx.rotate(Math.sin(o.spin*.5)*.12);
    ctx.fillStyle=GOLD; rr(-w/2,-ht/2,w,ht,3); ctx.fill();
    ctx.fillStyle=DODGER; ctx.fillRect(-w/2,-ht*.12,w,ht*.26);
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(-w*.22,-ht/2-SZ*.10,w*.44,SZ*.10);
    ctx.fillStyle=GOLD_HI; ctx.fillRect(-w*.34,-ht*.42,w*.14,ht*.7);
  }
  else if(id==='bowling'){
    const r=SZ*.24;
    const g=ctx.createRadialGradient(-r*.35,-r*.35,r*.1,0,0,r);
    g.addColorStop(0,'#4a5570'); g.addColorStop(.6,'#12161f'); g.addColorStop(1,'#000');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,r,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.14)';
    [[-.3,-.28],[.05,-.34],[-.12,-.05]].forEach(p=>{ctx.beginPath();ctx.arc(p[0]*r*2,p[1]*r*2,r*.11,0,7);ctx.fill();});
    ctx.strokeStyle='rgba(200,164,73,.4)'; ctx.lineWidth=1.4; ctx.beginPath(); ctx.arc(0,0,r,0,7); ctx.stroke();
  }
  else if(id==='cone'){
    const w=SZ*.30,ht=SZ*.42;
    ctx.fillStyle='#ff6b2b'; ctx.beginPath();
    ctx.moveTo(0,-ht/2); ctx.lineTo(w/2,ht/2); ctx.lineTo(-w/2,ht/2); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff'; ctx.fillRect(-w*.30,-ht*.06,w*.60,ht*.14);
    ctx.fillStyle='#2a2a2a'; ctx.fillRect(-w*.62,ht/2-2,w*1.24,SZ*.06);
  }
  else if(id==='dice'){
    const s2=SZ*.24;
    ctx.rotate(o.spin*.6);
    ctx.fillStyle='#fff'; rr(-s2/2,-s2/2,s2,s2,4); ctx.fill();
    ctx.strokeStyle='#ccc'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='#c1121f';
    [[-.26,-.26],[0,0],[.26,.26],[.26,-.26],[-.26,.26]].forEach(p=>{
      ctx.beginPath(); ctx.arc(p[0]*s2,p[1]*s2,s2*.09,0,7); ctx.fill();
    });
  }
  else if(id==='cab'){
    const w=SZ*1.05,ht=SZ*.44;
    ctx.fillStyle=GOLD; rr(-w/2,-ht/2,w,ht,6); ctx.fill();
    ctx.fillStyle=INK; rr(-w*.30,-ht*.44,w*.55,ht*.42,3); ctx.fill();
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(-w*.46,ht*.02,w*.92,ht*.16);
    ctx.fillStyle='#fff'; ctx.fillRect(-w*.10,-ht/2-SZ*.07,w*.20,SZ*.07);
    ctx.fillStyle='#0b0b0b';
    [-.30,.30].forEach(k=>{ctx.beginPath();ctx.arc(k*w,ht/2,SZ*.08,0,7);ctx.fill();});
    ctx.fillStyle='#fff9c4'; ctx.fillRect(w/2-3,-ht*.16,4,ht*.2);
  }
  else if(id==='zamboni'){
    const w=SZ*1.2,ht=SZ*.50;
    ctx.fillStyle=DODGER; rr(-w/2,-ht/2,w,ht,5); ctx.fill();
    ctx.fillStyle='#7fb2e5'; rr(-w*.34,-ht*.46,w*.42,ht*.40,3); ctx.fill();
    ctx.fillStyle=GOLD; ctx.fillRect(-w/2,ht*.14,w,ht*.14);
    ctx.fillStyle='#0b0b0b';
    [-.32,0,.32].forEach(k=>{ctx.beginPath();ctx.arc(k*w,ht/2,SZ*.075,0,7);ctx.fill();});
    ctx.fillStyle='rgba(255,255,255,.5)'; ctx.fillRect(-w/2-SZ*.10,ht*.30,SZ*.12,SZ*.05);
  }
  else if(id==='slushie'){
    const w=SZ*.28,ht=SZ*.44;
    ctx.fillStyle='rgba(255,255,255,.85)';
    ctx.beginPath(); ctx.moveTo(-w/2,-ht/2); ctx.lineTo(w/2,-ht/2); ctx.lineTo(w*.32,ht/2); ctx.lineTo(-w*.32,ht/2); ctx.closePath(); ctx.fill();
    ctx.fillStyle=DODGER; ctx.beginPath();
    ctx.moveTo(-w*.44,-ht*.18); ctx.lineTo(w*.44,-ht*.18); ctx.lineTo(w*.32,ht*.46); ctx.lineTo(-w*.32,ht*.46); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#e63946'; ctx.beginPath(); ctx.arc(0,-ht*.52,w*.30,0,7); ctx.fill();
    ctx.strokeStyle=GOLD; ctx.lineWidth=2.4; ctx.beginPath(); ctx.moveTo(w*.10,-ht*.52); ctx.lineTo(w*.22,-ht*.95); ctx.stroke();
  }
  else if(id==='puck'){
    const w=SZ*.34,ht=SZ*.16;
    ctx.rotate(Math.sin(o.spin)*.25);
    ctx.fillStyle='#0d0d0d'; rr(-w/2,-ht/2,w,ht,ht/2); ctx.fill();
    ctx.strokeStyle=GOLD; ctx.lineWidth=1.6; ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.10)'; rr(-w/2,-ht/2,w,ht*.4,ht/4); ctx.fill();
  }
  ctx.restore();
}

/* ---------- draw arena gates ---------- */
function drawArena(){
  const h=CH*ARENA_H;

  // facade
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#12030f'); g.addColorStop(.55,'#2a0722'); g.addColorStop(1,'#3d0a32');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,h);

  // magenta glow wash from the facade
  const gw=ctx.createLinearGradient(0,h*.2,0,h);
  gw.addColorStop(0,'rgba(255,43,209,0)');
  gw.addColorStop(1,'rgba(255,43,209,'+(0.16+Math.sin(t*2)*0.05)+')');
  ctx.fillStyle=gw; ctx.fillRect(0,h*.2,W,h*.8);

  // marquee text — pushed DOWN into the band, big, glowing magenta
  ctx.save();
  const fs=Math.max(15, Math.min(30, W*.062));
  ctx.font=`${fs}px 'Bebas Neue','Arial Narrow',Impact,sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.letterSpacing='4px';
  const ty=h*0.30;
  const pulse=0.72+Math.sin(t*2.6)*0.28;
  ctx.shadowColor=MAG; ctx.shadowBlur=26*pulse;
  ctx.fillStyle=MAG_HI;
  ctx.fillText('T-MOBILE ARENA', W/2, ty);
  ctx.shadowBlur=12*pulse;
  ctx.fillStyle='#fff';
  ctx.fillText('T-MOBILE ARENA', W/2, ty);
  ctx.restore();

  // gates sit BELOW the text
  const gy=h*0.50, gh=h*0.44;
  for(let i=0;i<5;i++){
    const x=gateX(i)*CW, gwid=CW*1.5, cx=x+CW*.5;
    if(gates[i]){
      ctx.save();
      ctx.shadowColor=MAG; ctx.shadowBlur=22;
      const fg=ctx.createLinearGradient(0,gy,0,gy+gh);
      fg.addColorStop(0,MAG_HI); fg.addColorStop(1,MAG);
      ctx.fillStyle=fg; rr(cx-gwid/2,gy,gwid,gh,4); ctx.fill();
      ctx.restore();
      // shield mark
      ctx.fillStyle='#2a0722';
      const cy=gy+gh*.5, sz=Math.min(gwid,gh)*.34;
      ctx.beginPath();
      ctx.moveTo(cx,cy-sz); ctx.lineTo(cx+sz*.8,cy-sz*.4); ctx.lineTo(cx+sz*.55,cy+sz*.65);
      ctx.lineTo(cx,cy+sz); ctx.lineTo(cx-sz*.55,cy+sz*.65); ctx.lineTo(cx-sz*.8,cy-sz*.4);
      ctx.closePath(); ctx.fill();
    }else{
      ctx.fillStyle='rgba(10,2,8,.72)'; rr(cx-gwid/2,gy,gwid,gh,4); ctx.fill();
      ctx.save();
      ctx.shadowColor=MAG; ctx.shadowBlur=10;
      ctx.strokeStyle='rgba(255,43,209,.85)'; ctx.lineWidth=2;
      rr(cx-gwid/2,gy,gwid,gh,4); ctx.stroke();
      ctx.restore();
      // pulsing arrow
      ctx.fillStyle='rgba(255,138,232,'+(0.3+Math.sin(t*4+i)*0.25)+')';
      const cy=gy+gh*.55, sz=Math.min(gwid,gh)*.2;
      ctx.beginPath(); ctx.moveTo(cx,cy-sz); ctx.lineTo(cx+sz*.8,cy+sz*.5); ctx.lineTo(cx-sz*.8,cy+sz*.5); ctx.closePath(); ctx.fill();
    }
  }

  // glowing magenta curb line
  ctx.save();
  ctx.shadowColor=MAG; ctx.shadowBlur=14;
  ctx.fillStyle=MAG; ctx.fillRect(0,h-3,W,3);
  ctx.restore();
}

/* ---------- draw player ---------- */
function drawPlayer(){
  const x=player.px*CW, y=rowY(player.py+1)-CH;
  const hop = player.hopT<1 ? Math.sin(player.hopT*Math.PI) : 0;
  const lift = hop*CH*.34;
  const cx=x+CW/2, cy=y+CH/2-lift;

  // shadow
  ctx.fillStyle='rgba(0,0,0,'+(.4-hop*.22)+')';
  ctx.beginPath(); ctx.ellipse(cx, y+CH*.82, CW*.30*(1-hop*.2), CH*.09*(1-hop*.2),0,0,7); ctx.fill();

  // board
  ctx.save();
  ctx.translate(cx, cy+CH*.30);
  ctx.rotate(hop*(player.dir==='left'?-.3:player.dir==='right'?.3:-.18));
  ctx.fillStyle='#3a2a18'; rr(-CW*.34,-CH*.035,CW*.68,CH*.07,3); ctx.fill();
  ctx.fillStyle=GOLD; rr(-CW*.34,-CH*.035,CW*.68,CH*.024,2); ctx.fill();
  ctx.fillStyle='#111';
  [-.20,.20].forEach(k=>{ctx.beginPath();ctx.arc(k*CW,CH*.055,CW*.035,0,7);ctx.fill();});
  ctx.restore();

  // stephen
  const sh=CH*1.05, sw=sh*(sprite.width/sprite.height||0.58);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(hop*(player.dir==='left'?-.16:player.dir==='right'?.16:0));
  if(state===ST.DEAD||state===ST.OVER){ ctx.globalAlpha=.5; ctx.rotate(1.2); }
  ctx.shadowColor='rgba(200,164,73,.5)'; ctx.shadowBlur=hop*18;
  if(spriteOK) ctx.drawImage(sprite, -sw/2, -sh*.62, sw, sh);
  else { ctx.fillStyle=DODGER; ctx.fillRect(-CW*.2,-CH*.5,CW*.4,CH*.8); }
  ctx.restore();
}

/* ---------- render ---------- */
function render(){
  ctx.save();
  if(shake>0) ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);

  // bg
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0e1c'); g.addColorStop(.5,'#111726'); g.addColorStop(1,'#080b14');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  drawArena();

  // lanes
  lanes.forEach(L=>{
    const y=rowY(L.row);
    if(L.median){
      ctx.fillStyle='#1b2540'; ctx.fillRect(0,y,W,CH);
      ctx.fillStyle=GOLD; ctx.globalAlpha=.42;
      for(let i=0;i<COLS*2;i++) ctx.fillRect(i*(W/(COLS*2)), y+CH*.44, W/(COLS*4), CH*.12);
      ctx.globalAlpha=1;
      ctx.strokeStyle='rgba(200,164,73,.6)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.moveTo(0,y+CH); ctx.lineTo(W,y+CH); ctx.stroke();
    }else{
      ctx.fillStyle= L.row%2===0 ? '#171d2e' : '#131826';
      ctx.fillRect(0,y,W,CH);
      // dashes
      ctx.save();
      ctx.shadowColor='rgba(255,255,255,.5)'; ctx.shadowBlur=5;
      ctx.strokeStyle='rgba(255,255,255,.62)'; ctx.lineWidth=2.4; ctx.setLineDash([CW*.30,CW*.22]);
      ctx.beginPath(); ctx.moveTo(0,y+CH*.5); ctx.lineTo(W,y+CH*.5); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
      // lane edge separators
      ctx.strokeStyle='rgba(255,255,255,.14)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
      L.items.forEach(o=> drawObstacle(o, (o.x+o.type.w/2)*CW, y+CH*.55, CH));
    }
  });

  // start row
  const sy=rowY(12);
  ctx.fillStyle='#131a2e'; ctx.fillRect(0,sy,W,CH*1.0);
  ctx.save(); ctx.shadowColor=BLUE; ctx.shadowBlur=12;
  ctx.strokeStyle='rgba(26,107,255,.9)'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(0,sy); ctx.lineTo(W,sy); ctx.stroke(); ctx.restore();
  ctx.save();
  ctx.font=`${Math.max(9,CW*.24)}px 'Bebas Neue','Arial Narrow',Impact,sans-serif`;
  ctx.fillStyle='rgba(26,107,255,.75)'; ctx.textAlign='center'; ctx.letterSpacing='3px';
  ctx.fillText('THE STRIP', W/2, sy+CH*.92);
  ctx.restore();

  drawPlayer();

  // particles
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill();
  });
  ctx.globalAlpha=1;

  if(state===ST.WIN){
    ctx.fillStyle='rgba(200,164,73,'+(0.10+Math.sin(t*14)*0.08)+')';
    ctx.fillRect(0,0,W,H);
  }
  ctx.restore();
}

/* ---------- loop ---------- */
let last=performance.now();
function loop(now){
  const dt=Math.min(.05,(now-last)/1000); last=now;
  if(state!==ST.TITLE){ update(dt); render(); }
  requestAnimationFrame(loop);
}

/* ---------- test hooks (harmless) ---------- */
try{ if(typeof globalThis!=='undefined'){ globalThis.getLanes=()=>lanes; globalThis.getPlayer=()=>player; globalThis.setLevel=v=>{level=v;}; } }catch(e){}

/* ---------- boot ---------- */
resize();
if(!CW||!CH){CW=W/COLS;CH=H/ROWS;}
best=+(localStorage.getItem('ss_best')||0);
document.getElementById('best').textContent = best>0 ? 'BEST '+best : '';
buildLanes(); resetPlayer(); syncHUD();
requestAnimationFrame(loop);
</script>
</body>
