  html{height:100%}

    overflow:hidden;

  }
  @media(max-width:900px){ #game-app{ height:calc(100vh - 88px); } }
  header{
    width:100%;
    max-width:560px;

  h1{

  #soundBtn{
    background:none; border:1px solid rgba(255,255,255,0.25); color:var(--dim);

  #stage{

  canvas{

  }

  #dropBar{
    width:100%;

  }
  #dropBtn{

    padding: 14px 44px;

<body>
<div id="vs-header"></div>

<div id="game-app">
<header>

<div class="hud">

<div id="stage">

    <h2 id="overlayTitle">KOKO PLINKO</h2>
    <div class="sub" id="overlaySub">Drag Koko across the top and let go to drop her exactly where you want. Land big, rack up the score, get more drops when you hit the JACKPOT.</div>
    <button id="mainBtn">START DROPPING</button>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub = document.getElementById('overlaySub');
const mainBtn = document.getElementById('mainBtn');
const scoreVal = document.getElementById('scoreVal');
const dropsVal = document.getElementById('dropsVal');
const bestVal = document.getElementById('bestVal');
const soundBtn = document.getElementById('soundBtn');
const toast = document.getElementById('toast');
const dropBtn = document.getElementById('dropBtn');

function safeGet(k){ try{ return localStorage.getItem(k);}catch(e){return null;} }
function safeSet(k,v){ try{ localStorage.setItem(k,v);}catch(e){} }

// ---------- Board layout ----------
const ROWS = 10;       // peg rows
const SLOT_COUNT = 9;  // bottom slots
let W, H, CELL;
const chipR = 16;
let chipX = 0;
let chipY = 30;
let dragging = false;
let dragOffsetX = 0;

function computeSize(){
  const navSpace = parseFloat(getComputedStyle(document.body).paddingTop) || 0;
  const maxW = Math.min(560, window.innerWidth) - 16;
  const maxH = window.innerHeight - navSpace - 260;
  W = maxW;
  H = Math.max(420, Math.min(640, maxH));
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W+'px';
  canvas.style.height = H+'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  if (!chipX) chipX = W/2;
  chipX = Math.max(chipR+2, Math.min(W-chipR-2, chipX));
  buildPegs();
}
window.addEventListener('resize', computeSize);

// ---------- Koko sprite ----------
const kokoImg = new Image();
kokoImg.src = "/images/koko-chip.webp";

// ---------- Audio ----------
let audioCtx = null;
let soundOn = false;
function initAudio(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
function beep(freq, dur, type='sine', vol=0.06){
  if (!soundOn || !audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.value = vol;
  o.connect(g); g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.stop(audioCtx.currentTime + dur);
}
function sfxPeg(){ beep(500 + Math.random()*300, 0.05, 'triangle', 0.035); }
function sfxLand(mult){
  if (mult >= 20) { [660,880,1100,1320].forEach((f,i)=> setTimeout(()=>beep(f,0.18,'triangle',0.08), i*70)); }
  else if (mult >= 5) { [660,880].forEach((f,i)=> setTimeout(()=>beep(f,0.15,'triangle',0.06), i*70)); }
  else { beep(400,0.15,'square',0.05); }
}
soundBtn.onclick = () => {
  initAudio();
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? '🔊' : '🔇';
  if (soundOn) beep(660,0.1,'triangle',0.05);
};

// ---------- Slots ----------
// symmetric multiplier distribution, center low, edges high (classic plinko risk curve)
const SLOTS = [
  { mult: 50,  label: 'JACKPOT',    color: '#FF3CAC' },
  { mult: 10,  label: 'ZOOMIES',    color: '#FF6B2B' },
  { mult: 5,   label: 'TREAT',      color: '#FFD23F' },
  { mult: 2,   label: 'GOOD GIRL',  color: '#1A6BFF' },
  { mult: 1,   label: 'BELLY RUB',  color: '#7A5CFF' },
  { mult: 2,   label: 'GOOD GIRL',  color: '#1A6BFF' },
  { mult: 5,   label: 'TREAT',      color: '#FFD23F' },
  { mult: 10,  label: 'ZOOMIES',    color: '#FF6B2B' },
  { mult: 50,  label: 'JACKPOT',    color: '#FF3CAC' },
];

const PEG_COLORS = ['#FF6B2B','#FFD23F','#1A6BFF','#FF3CAC','#7A5CFF','#3FE0C5'];

let pegs = [];
function buildPegs(){
  pegs = [];
  const marginX = 26;
  const topY = 76;
  const bottomY = H - 90;
  const rowGap = (bottomY - topY) / ROWS;
  for (let row = 0; row < ROWS; row++){
    const count = 4 + row; // triangle growth (full-density count, then we skip half)
    const y = topY + row*rowGap;
    const usableW = W - marginX*2;
    const gap = usableW / (count+1);
    // skip every other peg, alternating which parity we skip per row so gaps stagger
    // like a real plinko board rather than lining up into columns
    const keepEven = row % 2 === 0;
    for (let i=1;i<=count;i++){
      const isEven = i % 2 === 0;
      if (isEven !== keepEven) continue;
      const x = marginX + gap*i;
      pegs.push({ x, y, r: 5.5, hitFlash: 0, color: PEG_COLORS[(row+i) % PEG_COLORS.length] });
    }
  }
}

// ---------- Game state ----------
let state = 'menu';
let score = 0;
let best = parseInt(safeGet('plinko_best') || '0');
let dropsLeft = 3;
bestVal.textContent = best;
dropsVal.textContent = dropsLeft;

let balls = []; // active falling balls
let confetti = [];
let slotFlash = new Array(SLOT_COUNT).fill(0);

function resetGame(){
  score = 0;
  dropsLeft = 3;
  balls = [];
  confetti = [];
  slotFlash = new Array(SLOT_COUNT).fill(0);
  scoreVal.textContent = score;
  dropsVal.textContent = dropsLeft;
  updateDropBtn();
}

function updateDropBtn(){
  dropBtn.disabled = (dropsLeft <= 0) || (state !== 'playing');
  dropBtn.textContent = dropsLeft > 0 ? `OR TAP TO DROP CENTER (${dropsLeft})` : 'OUT OF DROPS';
  dropsVal.textContent = Math.max(0, dropsLeft);
}

function dropBall(atX){
  if (state !== 'playing' || dropsLeft <= 0) return;
  initAudio();
  dropsLeft--;
  updateDropBtn();
  const startX = (atX !== undefined) ? atX : chipX;
  const clampedX = Math.max(chipR+2, Math.min(W-chipR-2, startX));
  balls.push({
    x: clampedX, y: chipY,
    vx: (Math.random()-0.5)*3,
    vy: 0,
    r: 14,
    trail: [],
    settled: false,
    squashX: 1, squashY: 1, spin: 0, spinV: (Math.random()-0.5)*0.4,
    phase: 'chaos',
    chaosT: 0,
    chaosDur: 2.6 + Math.random()*0.8,
    chaosVX: (Math.random()-0.5)*14,
    chaosVY: (Math.random()-0.5)*10
  });
}
dropBtn.onclick = () => dropBall();

// ---------- Drag-to-aim chip ----------
function canvasPoint(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  return { x: (clientX-rect.left)*scaleX, y: (clientY-rect.top)*scaleY };
}
function chipHit(px, py){
  return Math.hypot(px-chipX, py-chipY) < chipR + 14;
}
function startDrag(clientX, clientY){
  if (state !== 'playing' || dropsLeft <= 0) return;
  const p = canvasPoint(clientX, clientY);
  if (chipHit(p.x, p.y)) {
    dragging = true;
    dragOffsetX = chipX - p.x;
    initAudio();
  }
}
function moveDrag(clientX, clientY){
  if (!dragging) return;
  const p = canvasPoint(clientX, clientY);
  chipX = Math.max(chipR+2, Math.min(W-chipR-2, p.x + dragOffsetX));
}
function endDrag(){
  if (!dragging) return;
  dragging = false;
  dropBall(chipX);
}
canvas.addEventListener('mousedown', e => startDrag(e.clientX, e.clientY));
window.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
window.addEventListener('mouseup', endDrag);
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  startDrag(t.clientX, t.clientY);
}, {passive:true});
canvas.addEventListener('touchmove', e => {
  if (dragging) e.preventDefault();
  const t = e.touches[0];
  moveDrag(t.clientX, t.clientY);
}, {passive:false});
canvas.addEventListener('touchend', endDrag, {passive:true});

// ---------- Toast ----------
let toastTimer = null;
function showToast(text){
  toast.textContent = text;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> toast.classList.remove('show'), 1400);
}

function spawnConfettiBurst(x,y,color,scale=1){
  const count = Math.round(26 * scale);
  for (let i=0;i<count;i++){
    const ang = Math.random()*Math.PI*2;
    const spd = (2 + Math.random()*4) * Math.min(1.8, scale);
    confetti.push({
      x, y,
      vx: Math.cos(ang)*spd,
      vy: Math.sin(ang)*spd - 2,
      life: 1,
      size: (3+Math.random()*4) * Math.min(1.5, scale),
      color: Math.random() < 0.5 ? color : ['#FF6B2B','#FFD23F','#1A6BFF','#FF3CAC','#3FE0C5'][Math.floor(Math.random()*5)],
      rot: Math.random()*Math.PI*2,
      vrot: (Math.random()-0.5)*0.3
    });
  }
}

// ---------- Screen shake (big wins) ----------
let shakeMag = 0;
function triggerShake(mag){ shakeMag = Math.max(shakeMag, mag); }

// ---------- Physics update ----------
const GRAVITY = 0.42;
function updateBalls(){
  const slotAreaTop = H - 70;
  const slotW = W / SLOT_COUNT;
  const chaosZoneBottom = Math.min(H*0.32, 170);

  for (const b of balls) {
    if (b.settled) continue;

    b._stuckTimer = (b._stuckTimer || 0);
    b._age = (b._age || 0) + 1;

    // ---- CHAOS PRE-DROP PHASE ----
    // ball zips around a bounded top zone at high erratic speed for ~3s,
    // randomly changing direction, before releasing into normal gravity fall
    if (b.phase === 'chaos') {
      b.chaosT += 1/60;

      // random erratic direction changes — total madness
      if (Math.random() < 0.18) {
        b.chaosVX = (Math.random()-0.5)*16;
        b.chaosVY = (Math.random()-0.5)*14;
        sfxPeg();
      }

      b.x += b.chaosVX;
      b.y += b.chaosVY;

      // bounce off the chaos zone bounds (top strip of the board)
      const zoneTop = b.r+4;
      const zoneBottom = chaosZoneBottom;
      if (b.x < b.r) { b.x = b.r; b.chaosVX = Math.abs(b.chaosVX); squashBall(b,1); }
      if (b.x > W-b.r) { b.x = W-b.r; b.chaosVX = -Math.abs(b.chaosVX); squashBall(b,1); }
      if (b.y < zoneTop) { b.y = zoneTop; b.chaosVY = Math.abs(b.chaosVY); squashBall(b,1); }
      if (b.y > zoneBottom) { b.y = zoneBottom; b.chaosVY = -Math.abs(b.chaosVY); squashBall(b,1); }

      b.spinV = (b.spinV||0) + (Math.random()-0.5)*2.2;
      b.spin = (b.spin||0) + b.spinV;
      b.spinV *= 0.9;
      b.squashX = b.squashX === undefined ? 1 : b.squashX + (1 - b.squashX)*0.3;
      b.squashY = b.squashY === undefined ? 1 : b.squashY + (1 - b.squashY)*0.3;

      b.trail.push({x:b.x, y:b.y, color: PEG_COLORS[Math.floor(b.chaosT*8) % PEG_COLORS.length]});
      if (b.trail.length > 14) b.trail.shift();

      if (b.chaosT >= b.chaosDur) {
        // release into normal fall from current (random) position
        b.phase = 'falling';
        b.vx = b.chaosVX * 0.4;
        b.vy = Math.max(0, b.chaosVY * 0.3);
      }
      continue; // skip normal gravity/peg physics this frame while in chaos
    }

    b.vy += GRAVITY;
    b.x += b.vx;
    b.y += b.vy;
    b.vx *= 0.995;

    // squash/stretch decay back to normal
    b.squashX = b.squashX === undefined ? 1 : b.squashX + (1 - b.squashX)*0.25;
    b.squashY = b.squashY === undefined ? 1 : b.squashY + (1 - b.squashY)*0.25;
    b.spin = (b.spin || 0) + (b.spinV || 0);
    b.spinV = (b.spinV || 0) * 0.96;

    // trail
    b.trail.push({x:b.x, y:b.y});
    if (b.trail.length > 12) b.trail.shift();

    // wall bounds — comical hard bounce
    if (b.x < b.r) { b.x = b.r; b.vx = Math.abs(b.vx)*0.9 + 1.2; squashBall(b,1); }
    if (b.x > W-b.r) { b.x = W-b.r; b.vx = -Math.abs(b.vx)*0.9 - 1.2; squashBall(b,1); }

    // peg collisions — big comic bounce with strong randomized kick
    for (const p of pegs) {
      const dx = b.x - p.x, dy = b.y - p.y;
      const dist = Math.hypot(dx,dy);
      const minDist = b.r + p.r;
      if (dist < minDist) {
        let nx, ny;
        if (dist > 0.001) { nx = dx/dist; ny = dy/dist; }
        else { const a = Math.random()*Math.PI*2; nx = Math.cos(a); ny = Math.sin(a); }

        b.x = p.x + nx*(minDist+0.5);
        b.y = p.y + ny*(minDist+0.5);

        // proper reflection off the peg normal with restitution >1 for comic bounce energy;
        // sideways randomness only — vy is never re-randomized directly so gravity always
        // wins over time and the ball can't loop forever between two pegs
        const dot = b.vx*nx + b.vy*ny;
        const restitution = 1.15;
        b.vx -= (1+restitution)*dot*nx;
        b.vy -= (1+restitution)*dot*ny;
        b.vx += (Math.random()-0.5)*2.4;

        const spd = Math.hypot(b.vx, b.vy);
        if (spd < 1.8) { const boost = 1.8/(spd||0.01); b.vx*=boost; b.vy*=boost; }
        if (spd > 15) { const cap = 15/spd; b.vx*=cap; b.vy*=cap; }

        b.spinV = (b.spinV||0) + (Math.random()-0.5)*1.4;
        squashBall(b, Math.min(1, spd/8));
        p.hitFlash = 1;
        sfxPeg();
      }
    }

    // anti-stuck watchdog
    const speed = Math.hypot(b.vx, b.vy);
    if (speed < 1.5 && b.y < slotAreaTop - 10) {
      b._stuckTimer++;
      if (b._stuckTimer > 18) {
        b.vx += (Math.random()-0.5)*6;
        b.vy += 2 + Math.random()*2;
        b._stuckTimer = 0;
      }
    } else {
      b._stuckTimer = 0;
    }

    // absolute failsafe
    if (b._age > 900) {
      b.y = H - b.r - 6;
      b.settled = true;
      const slotIdx = Math.max(0, Math.min(SLOT_COUNT-1, Math.floor(b.x / slotW)));
      landBall(b, slotIdx);
      continue;
    }

    if (b.y > slotAreaTop && !b.settled) {
      b.vy = Math.min(b.vy, 8);
      if (b.y > H - b.r - 6) {
        b.y = H - b.r - 6;
        b.settled = true;
        const slotIdx = Math.max(0, Math.min(SLOT_COUNT-1, Math.floor(b.x / slotW)));
        landBall(b, slotIdx);
      }
    }
  }

  balls = balls.filter(b => !(b.settled && b._age > (b._settledAge||0) + 40) );
  for (const b of balls) {
    if (b.settled) b._settledAge = (b._settledAge||0) + 1;
  }

  for (const p of pegs) p.hitFlash *= 0.9;
  for (let i=0;i<SLOT_COUNT;i++) slotFlash[i] *= 0.92;

  for (const c of confetti) {
    c.vy += 0.12;
    c.x += c.vx; c.y += c.vy;
    c.rot += c.vrot;
    c.life -= 0.014;
  }
  confetti = confetti.filter(c => c.life > 0);

  shakeMag *= 0.88;
  if (shakeMag < 0.05) shakeMag = 0;
}

function squashBall(b, intensity){
  b.squashX = 1 + intensity*0.5;
  b.squashY = 1 - intensity*0.35;
}

function landBall(b, slotIdx){
  const slot = SLOTS[slotIdx];
  const gained = slot.mult * 10;
  score += gained;
  scoreVal.textContent = score;
  slotFlash[slotIdx] = 1;
  sfxLand(slot.mult);
  showToast(`${slot.label}! +${gained}`);
  const burstScale = slot.mult >= 20 ? 2.2 : slot.mult >= 5 ? 1.4 : 1;
  spawnConfettiBurst(b.x, H-40, slot.color, burstScale);
  if (slot.mult >= 5) triggerShake(slot.mult >= 20 ? 14 : 6);

  if (slot.mult >= 20) {
    dropsLeft += 1;
    updateDropBtn();
    setTimeout(()=> showToast('BONUS DROP! +1'), 500);
  }

  if (score > best) {
    best = score;
    safeSet('plinko_best', best);
    bestVal.textContent = best;
  }

  updateDropBtn();
  if (dropsLeft <= 0) {
    setTimeout(checkGameEnd, 900);
  }
}

function checkGameEnd(){
  if (dropsLeft <= 0 && balls.every(b => b.settled)) {
    gameOver();
  } else if (dropsLeft <= 0) {
    // some ball still mid-chaos or falling — check again shortly instead of giving up
    setTimeout(checkGameEnd, 400);
  }
}

// ---------- Render ----------
function drawPegs(){
  for (const p of pegs) {
    const glow = p.hitFlash;
    ctx.save();
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 4 + glow*14;
    ctx.fillStyle = glow > 0.05 ? '#fff' : p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r + glow*2, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawSlots(){
  const slotW = W / SLOT_COUNT;
  const slotY = H - 64;
  for (let i=0;i<SLOT_COUNT;i++){
    const s = SLOTS[i];
    const x = i*slotW;
    ctx.save();
    const flash = slotFlash[i];
    ctx.fillStyle = s.color;
    ctx.globalAlpha = 0.22 + flash*0.6;
    ctx.fillRect(x+2, slotY, slotW-4, 64);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 2;
    ctx.strokeRect(x+2, slotY, slotW-4, 64);

    ctx.fillStyle = '#fff';
    ctx.font = `800 ${Math.max(9, slotW*0.16)}px 'Barlow Condensed', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(s.mult+'x', x+slotW/2, slotY+22);

    ctx.font = `800 ${Math.max(6.5, slotW*0.1)}px 'Nunito', sans-serif`;
    ctx.fillStyle = s.color;
    // wrap label if needed by shrinking further for narrow slots
    ctx.fillText(s.label, x+slotW/2, slotY+40);
    ctx.textAlign = 'left';
    ctx.restore();
  }
  // divider pegs between slots
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i=1;i<SLOT_COUNT;i++){
    ctx.beginPath();
    ctx.arc(i*slotW, slotY, 3, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawBallTrail(b){
  for (let i=0;i<b.trail.length;i++){
    const t = b.trail[i];
    const alpha = (i/b.trail.length) * (t.color ? 0.65 : 0.5);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = t.color || '#FFD23F';
    ctx.beginPath();
    ctx.arc(t.x, t.y, b.r*0.5*(i/b.trail.length), 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawBall(b){
  drawBallTrail(b);
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.spin || 0);
  ctx.scale(b.squashX || 1, b.squashY || 1);
  ctx.save();
  ctx.beginPath();
  ctx.arc(0,0,b.r,0,Math.PI*2);
  ctx.clip();
  if (kokoImg.complete && kokoImg.naturalWidth > 0) {
    ctx.drawImage(kokoImg, -b.r, -b.r, b.r*2, b.r*2);
  } else {
    ctx.fillStyle = '#FF6B2B';
    ctx.fillRect(-b.r,-b.r,b.r*2,b.r*2);
  }
  ctx.restore();
  ctx.strokeStyle = '#FFD23F';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0,0,b.r,0,Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

function drawConfetti(){
  for (const c of confetti) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, c.life);
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.fillStyle = c.color;
    ctx.fillRect(-c.size/2, -c.size/2, c.size, c.size*0.6);
    ctx.restore();
  }
}

function drawAimLine(){
  if (!dragging) return;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,210,63,0.35)';
  ctx.lineWidth = 2;
  ctx.setLineDash([4,6]);
  ctx.beginPath();
  ctx.moveTo(chipX, chipY+chipR);
  ctx.lineTo(chipX, H-70);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawChip(){
  if (state !== 'playing' || dropsLeft <= 0) return;
  const pulse = 1 + Math.sin(Date.now()/220)*0.06;
  ctx.save();
  ctx.translate(chipX, chipY);
  ctx.scale(dragging ? 1.12 : pulse, dragging ? 1.12 : pulse);

  // glow ring to signal draggability
  ctx.save();
  ctx.shadowColor = '#FFD23F';
  ctx.shadowBlur = dragging ? 18 : 10;
  ctx.strokeStyle = '#FFD23F';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0,0,chipR+3,0,Math.PI*2);
  ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.beginPath();
  ctx.arc(0,0,chipR,0,Math.PI*2);
  ctx.clip();
  if (kokoImg.complete && kokoImg.naturalWidth > 0) {
    ctx.drawImage(kokoImg, -chipR, -chipR, chipR*2, chipR*2);
  } else {
    ctx.fillStyle = '#FF6B2B';
    ctx.fillRect(-chipR,-chipR,chipR*2,chipR*2);
  }
  ctx.restore();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0,0,chipR,0,Math.PI*2);
  ctx.stroke();
  ctx.restore();

  if (!dragging) {
    ctx.save();
    ctx.globalAlpha = 0.6 + Math.sin(Date.now()/300)*0.3;
    ctx.fillStyle = '#8b96c4';
    ctx.font = "800 10px 'Nunito', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillText('DRAG ME', chipX, chipY + chipR + 16);
    ctx.textAlign = 'left';
    ctx.restore();
  }
}

function render(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if (shakeMag > 0){
    ctx.translate((Math.random()-0.5)*shakeMag, (Math.random()-0.5)*shakeMag);
  }
  drawSlots();
  drawPegs();
  drawAimLine();
  for (const b of balls) drawBall(b);
  drawConfetti();
  drawChip();
  ctx.restore();
}

function loop(){
  if (state === 'playing') updateBalls();
  render();
  requestAnimationFrame(loop);
}

const overlayBody = document.querySelector('#overlay .badge').parentElement;

function setOverlayMenu(){
  overlayTitle.textContent = 'KOKO PLINKO';
  overlaySub.textContent = "Drag Koko across the top and let go to drop her exactly where you want. Land big, rack up the score, get more drops when you hit the JACKPOT.";
  overlaySub.style.display = '';
  const extras = overlayBody.querySelectorAll('.bigscore, .best');
  extras.forEach(el => el.remove());
  mainBtn.textContent = 'START DROPPING';
}

function setOverlayGameOver(){
  overlayTitle.textContent = 'ALL DROPPED!';
  overlaySub.style.display = 'none';
  const extras = overlayBody.querySelectorAll('.bigscore, .best');
  extras.forEach(el => el.remove());

  const bs = document.createElement('div');
  bs.className = 'bigscore';
  bs.style.fontFamily = "'Barlow Condensed', sans-serif";
  bs.style.fontWeight = '800';
  bs.style.fontSize = '46px';
  bs.style.color = '#fff';
  bs.textContent = score;
  const bestEl = document.createElement('div');
  bestEl.className = 'best';
  bestEl.style.color = '#FFD23F';
  bestEl.style.fontSize = '12px';
  bestEl.style.fontWeight = '800';
  bestEl.style.marginBottom = '20px';
  bestEl.style.letterSpacing = '.05em';
  bestEl.textContent = 'BEST: ' + best;
  overlaySub.insertAdjacentElement('afterend', bs);
  bs.insertAdjacentElement('afterend', bestEl);

  mainBtn.textContent = 'DROP AGAIN';
}

function gameOver(){
  state = 'gameover';
  setOverlayGameOver();
  overlay.classList.remove('hidden');
  updateDropBtn();
}

mainBtn.onclick = () => {
  initAudio();
  setOverlayMenu();
  overlay.classList.add('hidden');
  resetGame();
  state = 'playing';
  updateDropBtn();
};

computeSize();
resetGame();
render();
requestAnimationFrame(loop);
</script>
</body>
</html>
