<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="icon" href="/favicon.png" type="image/png" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<title>Mobile Shows Layout Preview | Vegas Sidekick</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#0A1628;--orange:#FF6B2B;--orange-lt:#ff8c33;--blue:#1A6BFF;
    --bg:#EAEEF5;--card:#fff;--ink:#0A1628;--soft:#64748B;--line:#E4E9F1;--chip:#EAF0FF;
    --display:'Bebas Neue',sans-serif;--cond:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;
    --radius:14px;
  }
  html{scroll-behavior:smooth}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  img{max-width:100%;display:block}
  a{text-decoration:none;color:inherit}
  button{font-family:inherit;cursor:pointer}

  .intro{background:var(--navy);color:#fff;padding:100px 20px 26px;text-align:center}
  .intro .tag{font-family:var(--body);font-weight:600;text-transform:uppercase;letter-spacing:.14em;font-size:.66rem;color:#7fb0ff;margin-bottom:8px}
  .intro h1{font-family:var(--display);font-size:2.4rem;letter-spacing:.02em;line-height:.95;margin-bottom:10px}
  .intro h1 span{color:var(--orange)}
  .intro p{max-width:560px;margin:0 auto;color:rgba(255,255,255,.66);font-size:.9rem}
  .modecap{max-width:560px;margin:16px auto 0;padding:11px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;font-size:.84rem;color:rgba(255,255,255,.82)}
  .modecap b{color:#fff}
  .modecap .d{display:block;margin-top:3px;font-family:var(--cond);font-weight:800;text-transform:uppercase;letter-spacing:.06em;font-size:.74rem;color:var(--orange)}

  .browse{max-width:540px;margin:0 auto;padding:0 0 130px}
  .filters{display:flex;gap:7px;padding:14px 16px 10px;overflow-x:auto;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .fchip{flex:0 0 auto;font-size:.74rem;font-weight:700;padding:7px 14px;border-radius:100px;border:1px solid var(--line);color:var(--soft);background:var(--card);white-space:nowrap}
  .fchip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .count{padding:2px 18px 8px;font-family:var(--cond);text-transform:uppercase;letter-spacing:.06em;font-weight:700;font-size:.74rem;color:var(--soft)}

  .list{padding:0 16px}
  .eyebrow{font-family:var(--cond);font-weight:800;text-transform:uppercase;letter-spacing:.08em;font-size:.64rem;color:var(--blue)}
  .title{font-family:var(--display);letter-spacing:.01em;line-height:.92;color:var(--ink)}
  .venue{color:var(--soft)}
  .from{font-family:var(--cond);font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:.6rem;color:var(--soft)}
  .price{font-family:var(--cond);font-weight:800;color:var(--orange);line-height:1}
  .pill{display:inline-block;font-family:var(--body);font-size:.63rem;font-weight:700;color:var(--blue);background:var(--chip);padding:3px 9px;border-radius:100px;white-space:nowrap}
  .catlabel{position:absolute;top:8px;right:8px;font-family:var(--cond);font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:.6rem;color:#fff;background:rgba(10,22,40,.8);padding:3px 8px;border-radius:6px}
  .chev{color:var(--orange);font-weight:800}

  /* A: LIST ROWS */
  .A .list{display:flex;flex-direction:column}
  .A .item{display:flex;gap:13px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
  .A .item:last-child{border-bottom:none}
  .A .ph{flex:0 0 78px;width:78px;height:78px;border-radius:12px;object-fit:cover;background:var(--line)}
  .A .mid{flex:1;min-width:0}
  .A .title{font-size:1.5rem;margin:1px 0}
  .A .venue{font-size:.74rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .A .rt{flex:0 0 auto;text-align:right;display:flex;flex-direction:column;align-items:flex-end}
  .A .price{font-size:1.6rem}
  .A .chev{font-size:1.15rem;margin-top:2px}
  .A .catlabel{position:static;display:inline-block;margin-bottom:3px;background:none;color:var(--blue);padding:0}

  /* B: 2-UP GRID */
  .B .list{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .B .item{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;box-shadow:0 2px 10px rgba(10,22,40,.04)}
  .B .imgwrap{position:relative;aspect-ratio:4/3;background:var(--line)}
  .B .imgwrap img{width:100%;height:100%;object-fit:cover}
  .B .body{padding:9px 11px 12px;display:flex;flex-direction:column;gap:3px;flex:1}
  .B .title{font-size:1.35rem}
  .B .venue{font-size:.68rem;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .B .pill{margin:1px 0}
  .B .prow{display:flex;align-items:baseline;gap:5px;margin-top:auto;padding-top:5px}
  .B .price{font-size:1.5rem}

  /* C: SLIM CARD */
  .C .list{display:flex;flex-direction:column;gap:13px}
  .C .item{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 12px rgba(10,22,40,.05)}
  .C .imgwrap{position:relative;aspect-ratio:3/2;background:var(--line)}
  .C .imgwrap img{width:100%;height:100%;object-fit:cover}
  .C .body{display:flex;align-items:center;gap:12px;padding:12px 14px}
  .C .mid{flex:1;min-width:0}
  .C .title{font-size:1.75rem}
  .C .venue{font-size:.76rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .C .pill{margin-top:6px}
  .C .rt{flex:0 0 auto;text-align:right}
  .C .price{font-size:1.9rem}

  /* bottom toggle bar */
  .toggle{position:fixed;left:50%;transform:translateX(-50%);bottom:16px;z-index:60;display:flex;gap:5px;background:var(--navy);border:1px solid rgba(255,255,255,.14);border-radius:100px;padding:6px;box-shadow:0 12px 34px -8px rgba(8,15,30,.6);width:calc(100% - 28px);max-width:440px}
  .toggle button{flex:1;border:none;background:transparent;color:rgba(255,255,255,.62);font-family:var(--body);font-weight:700;font-size:.8rem;padding:11px 6px;border-radius:100px;transition:.18s}
  .toggle button[aria-selected="true"]{background:var(--orange);color:#fff}
  .toggle button:focus-visible{outline:2px solid #7fb0ff;outline-offset:2px}
  @media (min-width:600px){ .A .title{font-size:1.7rem} }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div id="vs-header"></div>

<section class="intro">
  <div class="tag">Design Preview · Not Live Yet</div>
  <h1>Mobile Shows — <span>3 Layouts</span></h1>
  <p>Three ways to lay out the Shows list on a phone. Use the bar at the bottom to switch. Everything else — fonts, images, colors — is the real site.</p>
  <div class="modecap" id="cap"></div>
</section>

<div class="browse A" id="browse">
  <div class="filters">
    <span class="fchip on">All</span><span class="fchip">Comedy</span><span class="fchip">Magic</span><span class="fchip">Cirque</span><span class="fchip">Music</span><span class="fchip">Spectaculars</span><span class="fchip">Family</span><span class="fchip">Adult</span>
  </div>
  <div class="count">Preview sample · 16 of 49 shows</div>
  <div class="list" id="list"></div>
</div>

<div class="toggle" role="tablist" aria-label="Layout options">
  <button role="tab" aria-selected="true" data-mode="A" onclick="setMode('A')">① List</button>
  <button role="tab" aria-selected="false" data-mode="B" onclick="setMode('B')">② Grid</button>
  <button role="tab" aria-selected="false" data-mode="C" onclick="setMode('C')">③ Card</button>
</div>

<div id="vs-footer"></div>
<script src="/components/header.js?v=8"></script>
<script src="/components/footer.js?v=9"></script>
<script>
  const SHOWS = [{"name": "Myst\u00e8re", "sub": "by Cirque du Soleil", "venue": "Myst\u00e8re Theatre \u00b7 TI Hotel", "pd": "$63", "cat": "cirque", "pill": "The Original", "img": "/images/mystere-hero.jpg"}, {"name": "VEGAS! The Show", "sub": "", "venue": "Saxe Theater \u00b7 Planet Hollywood", "pd": "$55", "cat": "music", "pill": "Vegas History Tribute", "img": "/images/vegas-the-show-hero.webp"}, {"name": "The Wizard of Oz", "sub": "at MSG Sphere", "venue": "MSG Sphere \u00b7 Las Vegas", "pd": "$123", "cat": "spectaculars", "pill": "Vegas Bucket List", "img": "/images/wizard-of-oz-hero.webp"}, {"name": "Carrot Top", "sub": "", "venue": "Atrium Showroom \u00b7 Luxor Hotel", "pd": "$68", "cat": "comedy", "pill": "Vegas Icon", "img": "/images/carrot-top-hero.jpg"}, {"name": "\"O\"", "sub": "by Cirque du Soleil", "venue": "O Theatre \u00b7 Bellagio", "pd": "$119", "cat": "cirque", "pill": "Most Iconic Show", "img": "/images/o-hero.jpg"}, {"name": "Mat Franco", "sub": "Magic Reinvented Nightly", "venue": "Mat Franco Theater \u00b7 The LINQ", "pd": "$57", "cat": "magic", "pill": "Great Date Night", "img": "/images/mat-franco-hero.jpg"}, {"name": "Mad Apple", "sub": "by Cirque du Soleil", "venue": "New York-New York Theater", "pd": "$53", "cat": "cirque", "pill": "Cirque Goes Wild", "img": "/images/mad-apple-hero.jpg"}, {"name": "V \u2013 The Ultimate Variety Show", "sub": "", "venue": "V Theater \u00b7 Planet Hollywood", "pd": "$39", "cat": "family", "pill": "7 Nights a Week", "img": "/images/v-the-ultimate-variety-show-hero.jpg"}, {"name": "Penn & Teller", "sub": "", "venue": "Penn & Teller Theater \u00b7 Rio Hotel", "pd": "$90", "cat": "magic", "pill": "Vegas Legend", "img": "/images/penn-and-teller-hero.jpg"}, {"name": "Michael Jackson ONE", "sub": "by Cirque du Soleil", "venue": "Mandalay Bay Theatre", "pd": "$111", "cat": "cirque", "pill": "MJ Tribute", "img": "/images/mj-one-hero.jpg"}, {"name": "Shin Lim: LIMITLESS", "sub": "", "venue": "Palazzo Theatre \u00b7 The Venetian", "pd": "$67", "cat": "magic", "pill": "World-Class Card Magic", "img": "/images/shin-lim-limitless-hero.jpg"}, {"name": "Comedy Cellar", "sub": "", "venue": "Comedy Cellar \u00b7 Rio Hotel", "pd": "$41", "cat": "comedy", "pill": "NYC Meets Vegas", "img": "/images/comedy-cellar-hero.jpg"}, {"name": "K\u00c0", "sub": "by Cirque du Soleil", "venue": "K\u00c0 Theatre \u00b7 MGM Grand", "pd": "$86", "cat": "cirque", "pill": "Most Dramatic", "img": "/images/ka-hero.jpg"}, {"name": "Criss Angel MINDFREAK", "sub": "", "venue": "Criss Angel Theater \u00b7 Planet Hollywood", "pd": "$117", "cat": "magic", "pill": "Most Theatrical", "img": "/images/criss-angel-hero.jpg"}, {"name": "Marc Savard", "sub": "Comedy Hypnosis", "venue": "Nathan Burton Theater \u00b7 Showcase Mall", "pd": "$28", "cat": "comedy", "pill": "Best for Groups", "img": "/images/marc-savard-comedy-hypnosis-hero.jpg"}, {"name": "Tape Face", "sub": "", "venue": "Underground Theater \u00b7 MGM Grand", "pd": "$57", "cat": "comedy", "pill": "No Words Needed", "img": "/images/tape-face-hero.jpg"}];
  const CAT={cirque:'Cirque',magic:'Magic',comedy:'Comedy',music:'Music',spectaculars:'Spectaculars',family:'Family',adult:'Adult'};
  const CAPS={
    A:['<b>① List rows</b> — small thumbnail, details right, whole row taps through. Most scannable.','~5 shows per screen'],
    B:['<b>② 2-up grid</b> — posters at half size, two per row. Best balance of visual + density.','~4 shows per screen'],
    C:['<b>③ Slim card</b> — one-column poster, shorter crop, price inline, no big button. Lightest change.','~2–3 shows per screen']
  };
  function e(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}
  function A(s){return `<a class="item" href="#"><img class="ph" src="${s.img}" alt="" loading="lazy"><div class="mid"><span class="catlabel">${CAT[s.cat]||s.cat}</span><div class="title">${e(s.name)}</div><div class="venue">${e(s.venue)}</div></div><div class="rt"><span class="from">From</span><span class="price">${e(s.pd)}</span><span class="chev">›</span></div></a>`}
  function B(s){return `<a class="item" href="#"><div class="imgwrap"><img src="${s.img}" alt="" loading="lazy"><span class="catlabel">${CAT[s.cat]||s.cat}</span></div><div class="body"><div class="title">${e(s.name)}</div><div class="venue">${e(s.venue)}</div><span class="pill">${e(s.pill)}</span><div class="prow"><span class="from">From</span><span class="price">${e(s.pd)}</span></div></div></a>`}
  function C(s){return `<a class="item" href="#"><div class="imgwrap"><img src="${s.img}" alt="" loading="lazy"><span class="catlabel">${CAT[s.cat]||s.cat}</span></div><div class="body"><div class="mid"><div class="title">${e(s.name)}</div><div class="venue">${e(s.venue)}</div><span class="pill">${e(s.pill)}</span></div><div class="rt"><span class="from">From</span><br><span class="price">${e(s.pd)}</span></div></div></a>`}
  const R={A,B,C};
  function setMode(m){
    document.getElementById('browse').className='browse '+m;
    document.getElementById('list').innerHTML=SHOWS.map(R[m]).join('');
    document.querySelectorAll('.toggle button').forEach(b=>b.setAttribute('aria-selected', b.dataset.mode===m));
    document.getElementById('cap').innerHTML=CAPS[m][0]+'<span class="d">'+CAPS[m][1]+'</span>';
  }
  setMode('A');
</script>
</body>
</html>
