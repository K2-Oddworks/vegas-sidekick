name: Deploy to Cloudflare Workers

# Deploys the site (served as a Cloudflare Worker with static assets, per
# wrangler.jsonc) on every push to main. Requires a repo secret:
#   CLOUDFLARE_API_TOKEN   — a token with "Edit Cloudflare Workers" permission
# Optional (only if your token isn't already scoped to one account):
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account ID
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
