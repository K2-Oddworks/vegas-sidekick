<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VegasSidekick.com/NeonDesert</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050510;font-family:'Helvetica Neue',Arial,sans-serif}
#canvas{display:block;width:100vw;height:100vh}
#time-display{position:fixed;top:20px;left:20px;color:#fff;z-index:100;pointer-events:none;text-shadow:0 1px 10px rgba(0,0,0,0.95)}
#time-display .city{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;opacity:0.55;margin-bottom:2px}
#time-display .clock{font-size:21px;font-weight:300;letter-spacing:0.5px}
#watermark{position:fixed;top:19px;left:50%;transform:translateX(-50%);color:rgba(255,107,43,0.22);font-size:10px;letter-spacing:6px;text-transform:uppercase;font-weight:400;pointer-events:none;z-index:100;white-space:nowrap}
#controls{position:fixed;top:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:100}
.btn{background:rgba(5,5,20,0.78);border:1px solid rgba(255,255,255,0.16);color:rgba(255,255,255,0.82);padding:9px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;letter-spacing:0.4px;backdrop-filter:blur(10px);transition:background 0.2s,border-color 0.2s,color 0.2s;text-align:left;white-space:nowrap}
.btn:hover{background:rgba(255,107,43,0.28);border-color:rgba(255,107,43,0.65);color:#fff}
.btn.active{background:rgba(255,107,43,0.38);border-color:#FF6B2B;color:#fff}
#footer{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);color:#FF6B2B;font-size:12px;letter-spacing:1.5px;opacity:0;animation:fadeUp 1.5s ease 2.2s forwards;pointer-events:none;z-index:100;text-shadow:0 0 18px rgba(255,107,43,0.55);white-space:nowrap}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:0.88;transform:translateX(-50%) translateY(0)}}
#loading{position:fixed;inset:0;background:#050510;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999;transition:opacity 1s ease}
#loading.fade{opacity:0;pointer-events:none}
.ld-title{color:#FF6B2B;font-size:28px;letter-spacing:8px;font-weight:300;text-transform:uppercase;text-shadow:0 0 40px rgba(255,107,43,0.5)}
.ld-sub{color:rgba(255,255,255,0.28);font-size:10px;letter-spacing:4px;text-transform:uppercase}
@media(max-width:768px){#controls{top:auto;bottom:52px;right:12px;flex-direction:row;flex-wrap:wrap;justify-content:flex-end;max-width:calc(100vw - 24px)}.btn{padding:7px 10px;font-size:11px}#time-display{top:12px;left:12px}#footer{font-size:11px;bottom:8px}}

/* ── Property info popup ── */
#bb-popup{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:300;pointer-events:none;opacity:0;transition:opacity 0.3s ease}
#bb-popup.visible{opacity:1;pointer-events:all}
#bb-popup .backdrop{position:absolute;inset:0;background:rgba(0,0,10,0.45);backdrop-filter:blur(3px)}
#bb-popup .card{position:relative;background:rgba(5,5,22,0.96);border:1px solid rgba(68,136,255,0.55);border-radius:14px;padding:32px 36px 28px;text-align:center;box-shadow:0 0 0 1px rgba(68,136,255,0.12),0 0 40px rgba(51,102,255,0.25),0 0 90px rgba(51,102,255,0.08);max-width:340px;width:90vw;transform:translateY(18px) scale(0.97);transition:transform 0.3s cubic-bezier(.22,.68,0,1.2)}
#bb-popup.visible .card{transform:translateY(0) scale(1)}
.bb-close{position:absolute;top:12px;right:16px;background:none;border:none;color:rgba(255,255,255,0.38);font-size:22px;cursor:pointer;line-height:1;transition:color 0.15s}
.bb-close:hover{color:#fff}
.bb-eyebrow{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(68,136,255,0.8);margin-bottom:10px}
.bb-name{color:#fff;font-size:22px;font-weight:700;letter-spacing:0.5px;line-height:1.2;margin-bottom:6px}
.bb-sub{color:rgba(255,255,255,0.38);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px}
.bb-cta{display:inline-block;background:#FF6B2B;color:#fff;text-decoration:none;padding:13px 32px;border-radius:7px;font-size:14px;font-weight:700;letter-spacing:0.6px;box-shadow:0 0 24px rgba(255,107,43,0.45);transition:background 0.18s,box-shadow 0.18s,transform 0.12s}
.bb-cta:hover{background:#ff7d40;box-shadow:0 0 40px rgba(255,107,43,0.65);transform:translateY(-1px)}
.bb-cta:active{transform:translateY(0)}
</style>
</head>
<body>
<div id="loading">
  <div class="ld-title">NEON DESERT</div>
  <div class="ld-sub">VegasSidekick.com/NeonDesert</div>
</div>
<canvas id="canvas"></canvas>
<div id="time-display">
  <div class="city">Las Vegas</div>
  <div class="clock" id="clock-text">&#8212;</div>
</div>
<div id="watermark">NEON DESERT</div>
<div id="controls">
  <button class="btn" id="btn-tour"   onclick="toggleAutoTour()">&#9654; Drive The Strip</button>
  <button class="btn" id="btn-cin"    onclick="toggleCinematic()">&#10022; Cinematic</button>
  <button class="btn" id="btn-lights" onclick="toggleLights()">&#128161; Toggle Lights</button>
  <button class="btn" id="btn-reset"  onclick="resetCamera()">&#8635; Reset</button>
</div>
<div id="footer">&#127797; VegasSidekick.com/NeonDesert</div>

<div id="bb-popup">
  <div class="backdrop" onclick="closePopup()"></div>
  <div class="card">
    <button class="bb-close" onclick="closePopup()">&#215;</button>
    <div class="bb-eyebrow" id="bb-eyebrow">Las Vegas Strip</div>
    <div class="bb-name" id="bb-name">Property</div>
    <div class="bb-sub" id="bb-sub">Las Vegas, NV</div>
    <a class="bb-cta" id="bb-link" href="#" target="_blank" rel="noopener">Get Tickets &amp; Info &#8594;</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════════════════
//  NEON DESERT — Las Vegas Strip, south → north blockout
//
//  Coordinate system:
//    • The Strip runs along the Z axis. SOUTH is +Z, NORTH is −Z.
//    • The "Welcome to Fabulous Las Vegas" sign anchors the south end (z ≈ +30).
//    • The STRAT tower anchors the north end (z ≈ −640).
//    • WEST side of the boulevard = −X, EAST side = +X.
//    • Ground plane at y = 0; buildings sit on it.
//
//  Properties are data-driven (see STRIP[] registry below). Each entry currently
//  renders a labeled grey-box placeholder. To promote one to a detailed model,
//  give its registry row a `build` function — the placeholder is skipped and the
//  custom builder runs in its place. Everything else (spacing, labels, clicks,
//  time-of-day lighting) keeps working unchanged.
// ═══════════════════════════════════════════════════════════════════════════════

// ─── Config ───────────────────────────────────────────────────────────────────
const IS_MOBILE = window.innerWidth < 768;
const GROUND_Y  = 0;
const ROAD_HALF = 13;    // half-width of asphalt (6 lanes total: 3 per side)
const MEDIAN_HALF = 1.6; // half-width of the raised centre divider
const CURB_GAP  = 6;     // sidewalk gap between road edge and building face

// ─── Renderer ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: !IS_MOBILE, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, IS_MOBILE ? 1.5 : 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = !IS_MOBILE;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.2;

// ─── Scene ────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x1a1a4e, 160, 1350);

// ─── Camera ───────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 3000);
const CAM_DEFAULT = new THREE.Vector3(46, 22, 96);
const TARGET_DEFAULT = new THREE.Vector3(0, 6, -140);
camera.position.copy(CAM_DEFAULT);

// ─── OrbitControls ────────────────────────────────────────────────────────────
const controls = new THREE.OrbitControls(camera, canvas);
controls.target.copy(TARGET_DEFAULT);
controls.minDistance = 12;
controls.maxDistance = 620;
controls.minPolarAngle = Math.PI * 0.06;   // don't flip to a straight-down top view
controls.maxPolarAngle = Math.PI * 0.47;   // stay above the horizon — never look up under the map
controls.screenSpacePanning = false;       // panning glides along the ground, not up into the sky
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.update();

// keep the orbit target from drifting below ground or off into the void
function clampTarget() {
  const t = controls.target;
  t.y = Math.max(1.5, Math.min(28, t.y));
  t.x = Math.max(-120, Math.min(120, t.x));
  t.z = Math.max(-780, Math.min(70, t.z));
}

// ─── Post-processing ──────────────────────────────────────────────────────────
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));
const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.6, 0.5, 0.82);
composer.addPass(bloomPass);

// ─── Las Vegas time ───────────────────────────────────────────────────────────
const LV_TZ = 'America/Los_Angeles';
function getLVHour() {
  return parseInt(new Intl.DateTimeFormat('en-US', { timeZone: LV_TZ, hour: 'numeric', hour12: false }).format(new Date()), 10);
}
function getLVTimeStr() {
  return new Intl.DateTimeFormat('en-US', { timeZone: LV_TZ, hour: 'numeric', minute: '2-digit', hour12: true }).format(new Date());
}
function getTODPhase(h) {
  if (h >= 6  && h < 8)  return 'sunrise';
  if (h >= 8  && h < 17) return 'day';
  if (h >= 17 && h < 19) return 'golden';
  if (h >= 19 && h < 21) return 'dusk';
  return 'night';
}

// ─── Toon gradient map (3-step cel shading) ───────────────────────────────────
const toonGrad = (() => {
  const t = new THREE.DataTexture(new Uint8Array([40, 120, 210]), 3, 1, THREE.LuminanceFormat);
  t.minFilter = t.magFilter = THREE.NearestFilter;
  t.needsUpdate = true;
  return t;
})();
function toon(color, opts = {}) {
  return new THREE.MeshToonMaterial({ color, gradientMap: toonGrad, ...opts });
}
function addEdges(mesh, color = 0x3366ff, thresh = 15) {
  const edges = new THREE.EdgesGeometry(mesh.geometry, thresh);
  const line  = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color }));
  mesh.add(line);
  return line;
}

// ─── Lights ───────────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x405060, 0.5);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xfff5dd, 1.5);
sunLight.position.set(70, 120, 60);
if (!IS_MOBILE) {
  sunLight.castShadow = true;
  sunLight.shadow.mapSize.set(2048, 2048);
  const sc = sunLight.shadow.camera;
  sc.near = 1; sc.far = 600;
  sc.left = sc.bottom = -160; sc.right = sc.top = 160;
  sunLight.shadow.bias = -0.0005;
}
scene.add(sunLight);

const moonLight = new THREE.DirectionalLight(0x8899cc, 0.0);
moonLight.position.set(-60, 90, -40);
scene.add(moonLight);

// ─── Sky sphere ───────────────────────────────────────────────────────────────
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: { uTop: { value: new THREE.Color(0x020208) }, uHori: { value: new THREE.Color(0x080820) } },
  vertexShader: `varying float vY; void main() { vec4 wp = modelMatrix * vec4(position,1.0); vY = wp.y; gl_Position = projectionMatrix * viewMatrix * wp; }`,
  fragmentShader: `uniform vec3 uTop; uniform vec3 uHori; varying float vY; void main() { float t = pow(clamp(vY/700.0,0.0,1.0),0.45); gl_FragColor = vec4(mix(uHori,uTop,t),1.0); }`
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1400, 32, 16), skyMat));

// ─── Stars ────────────────────────────────────────────────────────────────────
const STAR_N = IS_MOBILE ? 1200 : 2500;
const starPos = new Float32Array(STAR_N * 3);
for (let i = 0; i < STAR_N; i++) {
  const theta = Math.random() * Math.PI * 2, phi = Math.acos(Math.random() * 0.85), r = 1150 + Math.random() * 80;
  starPos[i*3] = r*Math.sin(phi)*Math.cos(theta); starPos[i*3+1] = r*Math.cos(phi); starPos[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 2.0, transparent: true, opacity: 0, sizeAttenuation: true });
scene.add(new THREE.Points(starGeo, starMat));

// ─── Ground ───────────────────────────────────────────────────────────────────
const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), toon(0xb59a6a));
ground.rotation.x = -Math.PI / 2;
ground.position.y = GROUND_Y;
ground.receiveShadow = !IS_MOBILE;
scene.add(ground);

// ─── Shared night-time lighting registries (driven by applyTOD) ────────────────
const streetLights   = [];   // PointLights that switch on at dusk/night
const emissiveMeshes = [];    // MeshToonMaterials whose emissive glows at night
let   signGlow = 0.15;        // baseline neon glow for animated pulsing

// ─── Canvas text label (billboard sprite, always faces camera) ─────────────────
function roundRect(g, x, y, w, h, r) {
  g.beginPath();
  g.moveTo(x + r, y);
  g.arcTo(x + w, y,     x + w, y + h, r);
  g.arcTo(x + w, y + h, x,     y + h, r);
  g.arcTo(x,     y + h, x,     y,     r);
  g.arcTo(x,     y,     x + w, y,     r);
  g.closePath();
}
function makeLabel(text) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 128;
  const g = c.getContext('2d');
  g.fillStyle = 'rgba(6,8,20,0.82)';
  roundRect(g, 6, 34, 500, 60, 16); g.fill();
  g.lineWidth = 3; g.strokeStyle = 'rgba(90,150,255,0.75)';
  roundRect(g, 6, 34, 500, 60, 16); g.stroke();
  g.font = 'bold 40px "Helvetica Neue", Arial, sans-serif';
  g.fillStyle = '#eaf2ff';
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText(text.toUpperCase(), 256, 66);
  const tex = new THREE.CanvasTexture(c);
  tex.anisotropy = IS_MOBILE ? 2 : 8;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false, depthTest: true }));
  spr.scale.set(22, 5.5, 1);
  return spr;
}

// ═══════════════════════════════════════════════════════════════════════════════
//  STRIP PROPERTY REGISTRY  (south → north)
//  [ name, side(-1 W / +1 E), z, width, depth, height, extraSetback ]
// ═══════════════════════════════════════════════════════════════════════════════
const W = -1, E = +1;
const STRIP = [
  // ── West side ──  (spread out for elbow room, ~22u gaps between building faces)
  ['Mandalay Bay',        W,  -35, 34, 30, 46, 0],
  ['Luxor',               W,  -87, 30, 30, 34, 0],
  ['Excalibur',           W, -137, 30, 26, 30, 0],
  ['New York-New York',   W, -184, 28, 24, 40, 0],
  ['Park MGM',            W, -229, 24, 22, 36, 0],
  ['Aria',                W, -273, 26, 22, 50, 8],
  ['The Cosmopolitan',    W, -316, 22, 20, 48, 0],
  ['Bellagio',            W, -361, 34, 26, 42, 6],
  ['Caesars Palace',      W, -410, 32, 28, 40, 10],
  ['Hard Rock',           W, -458, 30, 24, 38, 0],
  ['Treasure Island',     W, -503, 26, 22, 40, 0],
  ['Fashion Show Mall',   W, -549, 30, 26, 24, 0],
  ['Resorts World',       W, -598, 32, 28, 56, 0],
  ['Circus Circus',       W, -647, 34, 26, 28, 0],
  // ── East side ──
  ['MGM Grand',           E,  -50, 36, 32, 42, 0],
  ['Showcase Mall',       E,  -97, 20, 18, 22, 0],
  ['Planet Hollywood',    E, -139, 26, 22, 40, 0],
  ['Paris Las Vegas',     E, -184, 26, 24, 36, 0],
  ['Horseshoe',           E, -230, 28, 24, 38, 0],
  ['Flamingo',            E, -276, 30, 24, 34, 0],
  ['The LINQ',            E, -320, 22, 20, 26, 12],
  ['High Roller',         E, -322, 18, 18, 28, 34],
  ["Harrah's",            E, -363, 26, 22, 36, 0],
  ['The Venetian',        E, -411, 34, 30, 44, 0],
  ['The Palazzo',         E, -461, 28, 26, 48, 0],
  ['Sahara',              E, -615, 28, 24, 34, 0],
];

const clickables = [];  // { mesh, name, side }

// ─── Core box builder (labeled + clickable) ────────────────────────────────────
function makeBox(name, side, x, z, w, d, h, opts = {}) {
  const color   = opts.color   != null ? opts.color   : 0x2b3352;
  const edge    = opts.edge    != null ? opts.edge    : 0x4488ff;
  const emissive = opts.emissive != null ? opts.emissive : 0xffcc88;
  const mat = toon(color, { emissive: new THREE.Color(emissive), emissiveIntensity: 0 });
  const box = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  box.position.set(x, GROUND_Y + h / 2, z);
  if (!IS_MOBILE) { box.castShadow = true; box.receiveShadow = true; }
  addEdges(box, edge, 12);
  scene.add(box);
  emissiveMeshes.push(mat);
  clickables.push({ mesh: box, name, side });

  const label = makeLabel(name);
  label.position.set(x, GROUND_Y + h + 6, z);
  scene.add(label);
  return box;
}

// grey-box placeholder positioned from its side + setback
function makePlaceholder(name, side, z, w, d, h, setback) {
  const x = side * (ROAD_HALF + CURB_GAP + (setback || 0) + w / 2);
  return makeBox(name, side, x, z, w, d, h);
}

STRIP.forEach(([name, side, z, w, d, h, setback]) => makePlaceholder(name, side, z, w, d, h, setback));

// ─── Wynn & Encore — two bronze towers side by side (east side) ─────────────────
(function makeWynnEncore() {
  const baseX = E * (ROAD_HALF + CURB_GAP + 6 + 13);
  const opts = { color: 0x6e5626, edge: 0xd8a53a, emissive: 0xffcf7a };
  makeBox('Wynn',   E, baseX,     -512, 26, 24, 50, opts);
  makeBox('Encore', E, baseX + 7, -558, 24, 22, 48, opts);
})();

// ─── Sphere (MSG Sphere) — glowing LED orb set back behind the Palazzo ──────────
const sphereMat = new THREE.MeshToonMaterial({
  color: 0x0c0c14, gradientMap: toonGrad, emissive: new THREE.Color(0x4488ff), emissiveIntensity: 0.7
});
(function makeSphere() {
  const R = 22;
  const x = E * (ROAD_HALF + CURB_GAP + 30 + R);
  const z = -455;
  const sph = new THREE.Mesh(new THREE.SphereGeometry(R, 48, 32), sphereMat);
  sph.position.set(x, GROUND_Y + R, z);
  if (!IS_MOBILE) sph.castShadow = true;
  scene.add(sph);
  clickables.push({ mesh: sph, name: 'Sphere', side: E });

  const label = makeLabel('Sphere');
  label.position.set(x, GROUND_Y + R * 2 + 7, z);
  scene.add(label);

  const glow = new THREE.PointLight(0x66aaff, 0.9, 110);
  glow.position.set(x, GROUND_Y + R, z);
  scene.add(glow); // always lit (LED sphere) — not gated by TOD
})();

// ═══════════════════════════════════════════════════════════════════════════════
//  STRAT — north terminus (placeholder base + tall tower, so the north end reads)
// ═══════════════════════════════════════════════════════════════════════════════
(function makeStrat() {
  const z = -720, x = 40; // off the boulevard, east side at the north end
  const baseMat = toon(0x2b3352, { emissive: new THREE.Color(0xffcc88), emissiveIntensity: 0 });
  const base = new THREE.Mesh(new THREE.BoxGeometry(30, 26, 30), baseMat);
  base.position.set(x, GROUND_Y + 13, z);
  if (!IS_MOBILE) base.castShadow = true;
  addEdges(base, 0x4488ff, 12);
  scene.add(base); emissiveMeshes.push(baseMat);

  const towerMat = toon(0x33405f, { emissive: new THREE.Color(0xffd9a0), emissiveIntensity: 0 });
  const tower = new THREE.Mesh(new THREE.CylinderGeometry(2.2, 4.5, 90, 12), towerMat);
  tower.position.set(x, GROUND_Y + 26 + 45, z);
  if (!IS_MOBILE) tower.castShadow = true;
  scene.add(tower); emissiveMeshes.push(towerMat);

  const podMat = toon(0x44557a, { emissive: new THREE.Color(0xff8844), emissiveIntensity: 0.2 });
  const pod = new THREE.Mesh(new THREE.CylinderGeometry(7, 5, 8, 12), podMat);
  pod.position.set(x, GROUND_Y + 26 + 90 - 4, z);
  addEdges(pod, 0x66aaff, 15);
  scene.add(pod); emissiveMeshes.push(podMat);

  const spire = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 1.2, 30, 8), toon(0x556688));
  spire.position.set(x, GROUND_Y + 26 + 90 + 15, z);
  scene.add(spire);

  const tip = new THREE.PointLight(0xff5522, 0.0, 60);
  tip.position.set(x, GROUND_Y + 26 + 90 + 30, z);
  scene.add(tip); streetLights.push(tip);

  clickables.push({ mesh: base, name: 'The STRAT', side: 0 });

  const label = makeLabel('The STRAT');
  label.position.set(x, GROUND_Y + 26 + 90 + 40, z);
  scene.add(label);
})();

// ═══════════════════════════════════════════════════════════════════════════════
//  WELCOME TO FABULOUS LAS VEGAS — south anchor (real build)
// ═══════════════════════════════════════════════════════════════════════════════
const signBulbMat = new THREE.MeshToonMaterial({
  color: 0xfff6d0, gradientMap: toonGrad, emissive: new THREE.Color(0xffd23b), emissiveIntensity: 1.0
});
(function makeWelcomeSign() {
  const CW = 820, CH = 1040;
  // white diamond field polygon (canvas space): flat-ish top, side points, bottom point
  const P = [[235, 300], [585, 300], [752, 548], [410, 958], [68, 548]];

  // evenly spaced points around the polygon perimeter (for marquee bulbs)
  function perimeterPts(poly, count) {
    const segs = []; let total = 0;
    for (let i = 0; i < poly.length; i++) {
      const a = poly[i], b = poly[(i + 1) % poly.length];
      const L = Math.hypot(b[0] - a[0], b[1] - a[1]); segs.push({ a, b, L }); total += L;
    }
    const step = total / count, out = []; let si = 0, sofar = 0;
    for (let k = 0; k < count; k++) {
      const target = k * step;
      while (si < segs.length - 1 && sofar + segs[si].L < target) { sofar += segs[si].L; si++; }
      const t = (target - sofar) / segs[si].L, { a, b } = segs[si];
      out.push([a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t]);
    }
    return out;
  }
  const bulbPts = perimeterPts(P, 46);

  // 8-point starburst; returns the tip coordinates for glow bulbs
  let starTips = [];
  function starburst(g, cx, cy, R) {
    const tips = [];
    g.beginPath();
    for (let i = 0; i < 16; i++) {
      const ang = -Math.PI / 2 + i * Math.PI / 8, r = (i % 2 === 0) ? R : R * 0.4;
      const x = cx + Math.cos(ang) * r, y = cy + Math.sin(ang) * r;
      i ? g.lineTo(x, y) : g.moveTo(x, y);
      if (i % 2 === 0) tips.push([x, y]);
    }
    g.closePath(); g.fillStyle = '#e8601c'; g.fill();
    g.beginPath();
    for (let i = 0; i < 16; i++) {
      const ang = -Math.PI / 2 + i * Math.PI / 8, r = (i % 2 === 0) ? R * 0.62 : R * 0.24;
      const x = cx + Math.cos(ang) * r, y = cy + Math.sin(ang) * r;
      i ? g.lineTo(x, y) : g.moveTo(x, y);
    }
    g.closePath(); g.fillStyle = '#f4b31e'; g.fill();
    g.beginPath(); g.arc(cx, cy, R * 0.12, 0, Math.PI * 2); g.fillStyle = '#7a2d10'; g.fill();
    return tips;
  }
  function fitText(g, txt, cx, cy, maxW, font) {
    g.font = font; const w = g.measureText(txt).width, s = Math.min(1, maxW / w);
    g.save(); g.translate(cx, cy); g.scale(s, s); g.fillText(txt, 0, 0); g.restore();
  }
  function spacedText(g, txt, cx, cy, font, sp) {
    g.font = font; const chars = txt.split('');
    const widths = chars.map(c => g.measureText(c).width);
    const total = widths.reduce((a, b) => a + b, 0) + sp * (chars.length - 1);
    let x = cx - total / 2; g.textAlign = 'left';
    chars.forEach((ch, i) => { g.fillText(ch, x + widths[i] / 2, cy); x += widths[i] + sp; });
    g.textAlign = 'center';
  }

  function drawFace(front) {
    const c = document.createElement('canvas'); c.width = CW; c.height = CH;
    const g = c.getContext('2d'); g.clearRect(0, 0, CW, CH);
    // star support struts
    g.strokeStyle = '#9aa3ad'; g.lineWidth = 8;
    g.beginPath(); g.moveTo(345, 300); g.lineTo(365, 220); g.moveTo(475, 300); g.lineTo(455, 220); g.stroke();
    // starburst
    starTips = starburst(g, 410, 168, 128);
    // white diamond field + gold marquee border
    g.lineJoin = 'round';
    g.beginPath(); P.forEach((p, i) => i ? g.lineTo(p[0], p[1]) : g.moveTo(p[0], p[1])); g.closePath();
    g.fillStyle = '#f4ecd6'; g.fill();
    g.lineWidth = 26; g.strokeStyle = '#e6b23c'; g.stroke();
    g.lineWidth = 4;  g.strokeStyle = '#b6862a'; g.stroke();
    // painted glowing bulbs on the border
    bulbPts.forEach(([x, y]) => {
      g.save(); g.shadowColor = '#ffe27a'; g.shadowBlur = 14;
      g.beginPath(); g.arc(x, y, 7.5, 0, Math.PI * 2); g.fillStyle = '#fff4c2'; g.fill(); g.restore();
    });
    g.textAlign = 'center'; g.textBaseline = 'middle';
    if (front) {
      // WELCOME — seven silver-dollar circles, each with a red letter
      const letters = 'WELCOME'.split(''), n = letters.length, x0 = 120, x1 = 700, cy = 286, rad = 47;
      for (let i = 0; i < n; i++) {
        const cx = x0 + (x1 - x0) * i / (n - 1);
        g.beginPath(); g.arc(cx, cy, rad, 0, Math.PI * 2); g.fillStyle = '#dadadf'; g.fill();
        g.lineWidth = 5; g.strokeStyle = '#b03038'; g.stroke();
        g.lineWidth = 2; g.strokeStyle = '#7d1f26'; g.beginPath(); g.arc(cx, cy, rad - 7, 0, Math.PI * 2); g.stroke();
        g.fillStyle = '#c02030'; g.font = '700 46px Georgia, "Times New Roman", serif'; g.fillText(letters[i], cx, cy + 2);
      }
      g.fillStyle = '#16357e';
      g.font = 'italic 34px Georgia, serif'; g.fillText('to', 250, 424);
      g.font = 'italic 700 80px "Brush Script MT","Segoe Script","Snell Roundhand",cursive'; g.fillText('Fabulous', 472, 418);
      g.fillStyle = '#d21f2b'; fitText(g, 'LAS VEGAS', 410, 612, 600, '900 138px "Arial Black", Arial, sans-serif');
      g.fillStyle = '#16357e'; spacedText(g, 'NEVADA', 410, 748, '700 54px Arial, sans-serif', 14);
      g.fillStyle = '#b0242c'; g.font = '700 16px Arial'; g.fillText('YESCO', 410, 874);
    } else {
      g.fillStyle = '#d21f2b';
      fitText(g, 'DRIVE',     410, 384, 340, '900 86px "Arial Black", Arial, sans-serif');
      fitText(g, 'CAREFULLY', 410, 470, 560, '900 88px "Arial Black", Arial, sans-serif');
      g.fillStyle = '#16357e';
      g.font = 'italic 700 74px "Brush Script MT","Segoe Script",cursive'; g.fillText('Come Back', 410, 576);
      spacedText(g, 'SOON', 410, 664, '700 50px Arial, sans-serif', 13);
    }
    const tex = new THREE.CanvasTexture(c); tex.anisotropy = IS_MOBILE ? 2 : 8;
    return tex;
  }

  const frontTex = drawFace(true), backTex = drawFace(false);

  const SIGN_W = 15.5, SIGN_H = SIGN_W * CH / CW, PANEL_Y = 14;
  const toLocal = (cx, cy) => [(cx / CW - 0.5) * SIGN_W, (0.5 - cy / CH) * SIGN_H + PANEL_Y];
  const grp = new THREE.Group();

  // dark backing shaped to the diamond (so it isn't see-through, no rectangle edges)
  const bc = document.createElement('canvas'); bc.width = CW; bc.height = CH;
  const bg = bc.getContext('2d');
  bg.beginPath(); P.forEach((p, i) => i ? bg.lineTo(p[0], p[1]) : bg.moveTo(p[0], p[1])); bg.closePath();
  bg.fillStyle = '#14121c'; bg.fill();
  const backing = new THREE.Mesh(new THREE.PlaneGeometry(SIGN_W + 0.2, SIGN_H + 0.2),
    new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(bc), transparent: true }));
  backing.position.set(0, PANEL_Y, 0); grp.add(backing);

  // front + back faces
  const frontPanel = new THREE.Mesh(new THREE.PlaneGeometry(SIGN_W, SIGN_H),
    new THREE.MeshBasicMaterial({ map: frontTex, transparent: true }));
  frontPanel.position.set(0, PANEL_Y, 0.35); grp.add(frontPanel);
  const backPanel = new THREE.Mesh(new THREE.PlaneGeometry(SIGN_W, SIGN_H),
    new THREE.MeshBasicMaterial({ map: backTex, transparent: true }));
  backPanel.position.set(0, PANEL_Y, -0.35); backPanel.rotation.y = Math.PI; grp.add(backPanel);

  // 3D glow bulbs (bloom) at the painted border + star tips
  const bulbGeo = new THREE.SphereGeometry(0.17, 8, 6);
  bulbPts.forEach(([cx, cy]) => {
    const [lx, ly] = toLocal(cx, cy);
    const b = new THREE.Mesh(bulbGeo, signBulbMat); b.position.set(lx, ly, 0.42); grp.add(b);
  });
  const tipGeo = new THREE.SphereGeometry(0.22, 8, 6);
  starTips.forEach(([cx, cy]) => {
    const [lx, ly] = toLocal(cx, cy);
    const b = new THREE.Mesh(tipGeo, signBulbMat); b.position.set(lx, ly, 0.42); grp.add(b);
  });

  // two light-blue support poles up to the diamond's bottom point
  const poleMat = toon(0x3aa0d8);
  const bottomY = toLocal(410, 958)[1];
  [-3.2, 3.2].forEach(px => {
    const h = bottomY - GROUND_Y + 0.6;
    const pole = new THREE.Mesh(new THREE.BoxGeometry(1.1, h, 1.1), poleMat);
    pole.position.set(px, GROUND_Y + h / 2, -0.35);
    if (!IS_MOBILE) pole.castShadow = true;
    grp.add(pole);
  });

  // warm uplights so the sign glows from below (brighten at dusk/night via streetLights)
  const up = new THREE.PointLight(0xffe6a8, 0.7, 48); up.position.set(0, 4, 8);
  grp.add(up); streetLights.push(up);

  grp.position.set(0, GROUND_Y, 34);
  scene.add(grp);
  clickables.push({ mesh: frontPanel, name: 'Welcome to Fabulous Las Vegas', side: 0 });
})();

// ═══════════════════════════════════════════════════════════════════════════════
//  LAS VEGAS BOULEVARD — the Strip road (runs along Z)
// ═══════════════════════════════════════════════════════════════════════════════
(function makeBoulevard() {
  const Z_SOUTH = 60, Z_NORTH = -780;
  const LEN = Z_SOUTH - Z_NORTH;
  const MID = (Z_SOUTH + Z_NORTH) / 2;

  // asphalt — full 6-lane slab
  const road = new THREE.Mesh(new THREE.BoxGeometry(ROAD_HALF * 2, 0.3, LEN), toon(0x1c1c26));
  road.position.set(0, GROUND_Y + 0.15, MID);
  road.receiveShadow = !IS_MOBILE;
  scene.add(road);

  // sidewalks
  const swMat = toon(0x2e2e40);
  [-1, 1].forEach(s => {
    const sw = new THREE.Mesh(new THREE.BoxGeometry(CURB_GAP - 1, 0.36, LEN), swMat);
    sw.position.set(s * (ROAD_HALF + (CURB_GAP - 1) / 2), GROUND_Y + 0.18, MID);
    scene.add(sw);
  });

  // raised centre median divider
  const medMat = toon(0x33333f);
  const median = new THREE.Mesh(new THREE.BoxGeometry(MEDIAN_HALF * 2, 1.0, LEN), medMat);
  median.position.set(0, GROUND_Y + 0.5, MID);
  if (!IS_MOBILE) median.receiveShadow = true;
  scene.add(median);
  // warm glowing cap so the divider reads at night
  const capMat = new THREE.MeshToonMaterial({ color: 0xffcc88, emissive: 0xffaa55, emissiveIntensity: 0.35, gradientMap: toonGrad });
  const cap = new THREE.Mesh(new THREE.BoxGeometry(MEDIAN_HALF * 2 + 0.1, 0.14, LEN), capMat);
  cap.position.set(0, GROUND_Y + 1.05, MID);
  scene.add(cap); emissiveMeshes.push(capMat);

  // white lane dashes — two interior lines per side split each half into 3 lanes
  if (!IS_MOBILE) {
    const dashMat = new THREE.MeshToonMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.3, gradientMap: toonGrad });
    const laneW = (ROAD_HALF - MEDIAN_HALF) / 3;
    const laneXs = [MEDIAN_HALF + laneW, MEDIAN_HALF + laneW * 2];   // interior boundaries
    for (let z = Z_NORTH + 6; z < Z_SOUTH - 6; z += 11) {
      laneXs.forEach(bx => {
        [-1, 1].forEach(s => {
          const d = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.32, 4), dashMat);
          d.position.set(s * bx, GROUND_Y + 0.17, z);
          scene.add(d);
        });
      });
    }
  }

  // edge-line kerbs (solid white outer lane lines)
  const edgeMat = new THREE.MeshToonMaterial({ color: 0xdddddd, emissive: 0xffffff, emissiveIntensity: 0.15, gradientMap: toonGrad });
  [-1, 1].forEach(s => {
    const el = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.32, LEN), edgeMat);
    el.position.set(s * (ROAD_HALF - 0.4), GROUND_Y + 0.17, MID);
    scene.add(el);
  });

  // roadside streetlights every ~48 units, both sides
  const poleMat = toon(0x445566);
  const lampMat = new THREE.MeshToonMaterial({ color: 0xff9933, emissive: 0xff8800, emissiveIntensity: 1.2, gradientMap: toonGrad });
  const POLE_H = 8, OFF = ROAD_HALF + CURB_GAP - 1;
  for (let z = Z_NORTH + 30; z < Z_SOUTH - 20; z += 48) {
    [-1, 1].forEach(s => {
      const x = s * OFF;
      const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.18, POLE_H, 6), poleMat);
      pole.position.set(x, GROUND_Y + POLE_H / 2, z);
      scene.add(pole);
      const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.5, 6, 5), lampMat);
      lamp.position.set(x, GROUND_Y + POLE_H + 0.4, z);
      scene.add(lamp);
      const pl = new THREE.PointLight(0xff9944, 0.0, 22);
      pl.position.copy(lamp.position);
      scene.add(pl); streetLights.push(pl);
    });
  }

  // taller twin-head lamp posts down the median every ~64 units
  const medPoleH = 10;
  for (let z = Z_NORTH + 40; z < Z_SOUTH - 30; z += 64) {
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.22, medPoleH, 8), poleMat);
    pole.position.set(0, GROUND_Y + 1.0 + medPoleH / 2, z);
    if (!IS_MOBILE) pole.castShadow = true;
    scene.add(pole);
    [-1, 1].forEach(s => {
      const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.55, 6, 5), lampMat);
      lamp.position.set(s * 1.4, GROUND_Y + 1.0 + medPoleH + 0.3, z);
      scene.add(lamp);
      const pl = new THREE.PointLight(0xffbb66, 0.0, 26);
      pl.position.copy(lamp.position);
      scene.add(pl); streetLights.push(pl);
    });
  }
})();

// ═══════════════════════════════════════════════════════════════════════════════
//  TIME-OF-DAY LIGHTING
// ═══════════════════════════════════════════════════════════════════════════════
let lightOverride = null;
function applyTOD(phase) {
  const n=phase==='night', d=phase==='dusk', g=phase==='golden', s=phase==='sunrise', dy=phase==='day';
  if (dy)      { skyMat.uniforms.uTop.value.set(0x1a6bdc); skyMat.uniforms.uHori.value.set(0x87ceeb); }
  else if (s)  { skyMat.uniforms.uTop.value.set(0x2233aa); skyMat.uniforms.uHori.value.set(0xff7733); }
  else if (g)  { skyMat.uniforms.uTop.value.set(0x1a2299); skyMat.uniforms.uHori.value.set(0xff8833); }
  else if (d)  { skyMat.uniforms.uTop.value.set(0x0d0d66); skyMat.uniforms.uHori.value.set(0x2233aa); }
  else         { skyMat.uniforms.uTop.value.set(0x050514); skyMat.uniforms.uHori.value.set(0x121230); }

  sunLight.intensity = dy ? 2.2 : s ? 0.9 : g ? 1.3 : d ? 0.4 : 0.0;
  sunLight.color.setHex(dy ? 0xffffff : s ? 0xff8844 : g ? 0xffbb44 : d ? 0x6688cc : 0x111122);
  ambientLight.intensity = dy ? 0.6 : s ? 0.35 : g ? 0.4 : d ? 0.3 : 0.5;
  ambientLight.color.setHex(dy ? 0x8899cc : s ? 0xdd8866 : g ? 0xcc9944 : d ? 0x445577 : 0x5566aa);
  moonLight.intensity = n ? 0.4 : d ? 0.12 : 0.0;

  starMat.opacity = n ? 1.0 : d ? 0.4 : 0.0;
  bloomPass.strength = n ? (IS_MOBILE?1.0:2.0) : (d||g) ? (IS_MOBILE?0.5:1.0) : (IS_MOBILE?0.15:0.4);
  scene.fog.color.setHex(n ? 0x0a0a24 : dy ? 0xbfe0ff : (d||g) ? 0x2a2050 : 0x1a1a4e);

  const litI = n ? 1.6 : (d||g) ? 1.0 : 0.0;
  streetLights.forEach(l => { l.intensity = litI; });

  const emI = n ? 0.7 : (d||g) ? 0.4 : 0.0;
  emissiveMeshes.forEach(m => { m.emissiveIntensity = emI; });

  signGlow = n ? 1.0 : (d||g) ? 0.65 : 0.2;
}

// ═══════════════════════════════════════════════════════════════════════════════
//  CAMERA MODES
// ═══════════════════════════════════════════════════════════════════════════════
let autoTourOn = false, cinematicOn = false, tourT = 0, cinT = 0;
function toggleAutoTour() {
  autoTourOn = !autoTourOn; cinematicOn = false; tourT = 0;
  controls.enabled = !autoTourOn;
  document.getElementById('btn-tour').classList.toggle('active', autoTourOn);
  document.getElementById('btn-cin').classList.remove('active');
}
function toggleCinematic() {
  cinematicOn = !cinematicOn; autoTourOn = false; cinT = 0;
  controls.enabled = !cinematicOn;
  document.getElementById('btn-cin').classList.toggle('active', cinematicOn);
  document.getElementById('btn-tour').classList.remove('active');
}
// Mood: golden hour by default → live (real Vegas time) → night → back to golden
let moodMode = 'golden';
function updateMoodBtn() {
  const b = document.getElementById('btn-lights');
  if (!b) return;
  b.textContent = moodMode === 'golden' ? '☀️ Golden Hour'
                : moodMode === 'live'   ? '🕒 Live: ' + getLVTimeStr()
                :                         '🌙 Night';
}
function applyMood() {
  if (moodMode === 'live') { lightOverride = null; applyTOD(getTODPhase(getLVHour())); }
  else { lightOverride = moodMode; applyTOD(moodMode); }
  updateMoodBtn();
}
function toggleLights() {
  moodMode = moodMode === 'golden' ? 'live' : moodMode === 'live' ? 'night' : 'golden';
  applyMood();
}
function resetCamera() {
  autoTourOn = cinematicOn = false;
  controls.enabled = true;
  camera.position.copy(CAM_DEFAULT);
  controls.target.copy(TARGET_DEFAULT);
  controls.update();
  document.getElementById('btn-tour').classList.remove('active');
  document.getElementById('btn-cin').classList.remove('active');
}

// ═══════════════════════════════════════════════════════════════════════════════
//  RAYCASTER — click a property for its info popup
// ═══════════════════════════════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const _mouse = new THREE.Vector2();
function getPointerNDC(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  _mouse.x =  ((clientX - r.left) / r.width)  * 2 - 1;
  _mouse.y = -((clientY - r.top)  / r.height) * 2 + 1;
}
function hitTest() {
  raycaster.setFromCamera(_mouse, camera);
  const hits = raycaster.intersectObjects(clickables.map(c => c.mesh));
  return hits.length ? clickables.find(c => c.mesh === hits[0].object) : null;
}
function sideLabel(side) { return side < 0 ? 'West Side of the Strip' : side > 0 ? 'East Side of the Strip' : 'Las Vegas Boulevard'; }
function showPopup(hit) {
  document.getElementById('bb-eyebrow').textContent = 'Neon Desert · Las Vegas Strip';
  document.getElementById('bb-name').textContent = hit.name;
  document.getElementById('bb-sub').textContent  = sideLabel(hit.side);
  document.getElementById('bb-link').style.display = 'none'; // placeholders have no ticket link yet
  document.getElementById('bb-popup').classList.add('visible');
}
function closePopup() { document.getElementById('bb-popup').classList.remove('visible'); }

canvas.addEventListener('click', e => {
  getPointerNDC(e.clientX, e.clientY);
  const hit = hitTest();
  if (hit) showPopup(hit);
});
canvas.addEventListener('touchend', e => {
  if (e.changedTouches.length) {
    getPointerNDC(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    const hit = hitTest();
    if (hit) { e.preventDefault(); showPopup(hit); }
  }
}, { passive: false });
canvas.addEventListener('mousemove', e => {
  getPointerNDC(e.clientX, e.clientY);
  canvas.style.cursor = hitTest() ? 'pointer' : 'default';
});

// ═══════════════════════════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════════════════════
const clock = new THREE.Clock();
applyMood(); // default to golden hour
document.getElementById('clock-text').textContent = getLVTimeStr();
setInterval(() => {
  document.getElementById('clock-text').textContent = getLVTimeStr();
  if (moodMode === 'live') updateMoodBtn();
}, 15000);
let lastTODCheck = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta(), time = clock.getElapsedTime();
  if (lightOverride === null && time - lastTODCheck > 60) { lastTODCheck = time; applyTOD(getTODPhase(getLVHour())); }

  // welcome-sign neon shimmer
  signBulbMat.emissiveIntensity = signGlow * (0.6 + 0.4 * Math.sin(time * 4));
  // Sphere slow LED colour drift (always lit)
  sphereMat.emissive.setHSL((time * 0.045) % 1, 0.7, 0.5);

  if (autoTourOn) {
    // cruise north up the boulevard, then loop back to the south end
    tourT += dt;
    const z = 50 - ((tourT * 28) % 900);
    camera.position.set(Math.sin(tourT * 0.22) * 10, 7.5, z);
    camera.lookAt(Math.sin(tourT * 0.22 + 0.6) * 7, 6, z - 50);
  } else if (cinematicOn) {
    // slow high crane orbit over mid-strip
    cinT += dt;
    camera.position.set(Math.cos(cinT * 0.07) * 185, 95, -360 + Math.sin(cinT * 0.07) * 185);
    camera.lookAt(0, 4, -360);
  } else {
    clampTarget();
    controls.update();
  }
  composer.render();
}

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h; camera.updateProjectionMatrix();
  renderer.setSize(w, h); composer.setSize(w, h);
});
window.addEventListener('load', () => {
  setTimeout(() => { const ld = document.getElementById('loading'); ld.classList.add('fade'); setTimeout(() => ld.remove(), 1100); }, 1000);
});
animate();
</script>
