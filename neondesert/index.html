<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VegasSidekick.com/NeonDesert</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050510;font-family:'Helvetica Neue',Arial,sans-serif}
#canvas{display:block;width:100vw;height:100vh}
#time-display{position:fixed;top:20px;left:20px;color:#fff;z-index:100;pointer-events:none;text-shadow:0 1px 10px rgba(0,0,0,0.95)}
#time-display .city{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;opacity:0.55;margin-bottom:2px}
#time-display .clock{font-size:21px;font-weight:300;letter-spacing:0.5px}
#watermark{position:fixed;top:19px;left:50%;transform:translateX(-50%);color:rgba(255,107,43,0.22);font-size:10px;letter-spacing:6px;text-transform:uppercase;font-weight:400;pointer-events:none;z-index:100;white-space:nowrap}
#controls{position:fixed;top:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:100}
.btn{background:rgba(5,5,20,0.78);border:1px solid rgba(255,255,255,0.16);color:rgba(255,255,255,0.82);padding:9px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;letter-spacing:0.4px;backdrop-filter:blur(10px);transition:background 0.2s,border-color 0.2s,color 0.2s;text-align:left;white-space:nowrap}
.btn:hover{background:rgba(255,107,43,0.28);border-color:rgba(255,107,43,0.65);color:#fff}
.btn.active{background:rgba(255,107,43,0.38);border-color:#FF6B2B;color:#fff}
#footer{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);color:#FF6B2B;font-size:12px;letter-spacing:1.5px;opacity:0;animation:fadeUp 1.5s ease 2.2s forwards;pointer-events:none;z-index:100;text-shadow:0 0 18px rgba(255,107,43,0.55);white-space:nowrap}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:0.88;transform:translateX(-50%) translateY(0)}}
#loading{position:fixed;inset:0;background:#050510;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999;transition:opacity 1s ease}
#loading.fade{opacity:0;pointer-events:none}
.ld-title{color:#FF6B2B;font-size:28px;letter-spacing:8px;font-weight:300;text-transform:uppercase;text-shadow:0 0 40px rgba(255,107,43,0.5)}
.ld-sub{color:rgba(255,255,255,0.28);font-size:10px;letter-spacing:4px;text-transform:uppercase}
@media(max-width:768px){#controls{top:auto;bottom:52px;right:12px;flex-direction:row;flex-wrap:wrap;justify-content:flex-end;max-width:calc(100vw - 24px)}.btn{padding:7px 10px;font-size:11px}#time-display{top:12px;left:12px}#footer{font-size:11px;bottom:8px}}

/* ── Billboard popup ── */
#bb-popup{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:300;pointer-events:none;opacity:0;transition:opacity 0.3s ease}
#bb-popup.visible{opacity:1;pointer-events:all}
#bb-popup .backdrop{position:absolute;inset:0;background:rgba(0,0,10,0.45);backdrop-filter:blur(3px)}
#bb-popup .card{position:relative;background:rgba(5,5,22,0.96);border:1px solid rgba(68,136,255,0.55);border-radius:14px;padding:32px 36px 28px;text-align:center;box-shadow:0 0 0 1px rgba(68,136,255,0.12),0 0 40px rgba(51,102,255,0.25),0 0 90px rgba(51,102,255,0.08);max-width:340px;width:90vw;transform:translateY(18px) scale(0.97);transition:transform 0.3s cubic-bezier(.22,.68,0,1.2)}
#bb-popup.visible .card{transform:translateY(0) scale(1)}
.bb-close{position:absolute;top:12px;right:16px;background:none;border:none;color:rgba(255,255,255,0.38);font-size:22px;cursor:pointer;line-height:1;transition:color 0.15s}
.bb-close:hover{color:#fff}
.bb-eyebrow{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(68,136,255,0.8);margin-bottom:10px}
.bb-name{color:#fff;font-size:22px;font-weight:700;letter-spacing:0.5px;line-height:1.2;margin-bottom:6px}
.bb-sub{color:rgba(255,255,255,0.38);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px}
.bb-cta{display:inline-block;background:#FF6B2B;color:#fff;text-decoration:none;padding:13px 32px;border-radius:7px;font-size:14px;font-weight:700;letter-spacing:0.6px;box-shadow:0 0 24px rgba(255,107,43,0.45);transition:background 0.18s,box-shadow 0.18s,transform 0.12s}
.bb-cta:hover{background:#ff7d40;box-shadow:0 0 40px rgba(255,107,43,0.65);transform:translateY(-1px)}
.bb-cta:active{transform:translateY(0)}
</style>

// ─── Config ───────────────────────────────────────────────────────────────────
const IS_MOBILE = window.innerWidth < 768;
// Scene layout constants — positions relative to strip road
const HR_X = -5, HR_Z = -42;    // High Roller center (behind road)

// ─── Renderer ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: !IS_MOBILE, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, IS_MOBILE ? 1.5 : 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = !IS_MOBILE;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.2;

// ─── Scene ────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a22, 0.0012);

// ─── Camera ───────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
const CAM_DEFAULT = new THREE.Vector3(28, 6, 28);
camera.position.copy(CAM_DEFAULT);

// ─── OrbitControls ────────────────────────────────────────────────────────────
const controls = new THREE.OrbitControls(camera, canvas);
controls.target.set(-12, 2, -15);
controls.minDistance = 8;
controls.maxDistance = 120;
controls.maxPolarAngle = Math.PI * 0.49;
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.update();

// ─── Post-processing ──────────────────────────────────────────────────────────
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));
const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.8, 0.5, 0.82);
composer.addPass(bloomPass);

// ─── Las Vegas time ───────────────────────────────────────────────────────────
const LV_TZ = 'America/Los_Angeles';
function getLVHour() {
  return parseInt(new Intl.DateTimeFormat('en-US', { timeZone: LV_TZ, hour: 'numeric', hour12: false }).format(new Date()), 10);
}
function getLVTimeStr() {
  return new Intl.DateTimeFormat('en-US', { timeZone: LV_TZ, hour: 'numeric', minute: '2-digit', hour12: true }).format(new Date());
}
function getTODPhase(h) {
  if (h >= 6  && h < 8)  return 'sunrise';
  if (h >= 8  && h < 17) return 'day';
  if (h >= 17 && h < 19) return 'golden';
  if (h >= 19 && h < 21) return 'dusk';
  return 'night';
}

// ─── Toon gradient map (3-step cel shading) ───────────────────────────────────
const toonGrad = (() => {
  const t = new THREE.DataTexture(new Uint8Array([40, 120, 210]), 3, 1, THREE.LuminanceFormat);
  t.minFilter = t.magFilter = THREE.NearestFilter;
  t.needsUpdate = true;
  return t;
})();

function toon(color, opts = {}) {
  return new THREE.MeshToonMaterial({ color, gradientMap: toonGrad, ...opts });
}

// Add blue EdgesGeometry outline as child of mesh
function addEdges(mesh, color = 0x3366ff, thresh = 15) {
  const edges = new THREE.EdgesGeometry(mesh.geometry, thresh);
  const line  = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color }));
  mesh.add(line);
  return line;
}

// ─── Lights ───────────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x405060, 0.5);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xfff5dd, 1.5);
sunLight.position.set(60, 80, 30);
if (!IS_MOBILE) {
  sunLight.castShadow = true;
  sunLight.shadow.mapSize.set(2048, 2048);
  const sc = sunLight.shadow.camera;
  sc.near = 1; sc.far = 400;
  sc.left = sc.bottom = -70; sc.right = sc.top = 70;
  sunLight.shadow.bias = -0.0005;
}
scene.add(sunLight);

const moonLight = new THREE.DirectionalLight(0x8899cc, 0.0);
moonLight.position.set(-40, 60, -30);
scene.add(moonLight);

const hubGlow = new THREE.PointLight(0xfff5cc, 2.5, 22);
hubGlow.position.set(HR_X, 0, HR_Z + 1.5);
scene.add(hubGlow);

// ─── Sky sphere ───────────────────────────────────────────────────────────────
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: { uTop: { value: new THREE.Color(0x020208) }, uHori: { value: new THREE.Color(0x080820) } },
  vertexShader: `varying float vY; void main() { vec4 wp = modelMatrix * vec4(position,1.0); vY = wp.y; gl_Position = projectionMatrix * viewMatrix * wp; }`,
  fragmentShader: `uniform vec3 uTop; uniform vec3 uHori; varying float vY; void main() { float t = pow(clamp(vY/700.0,0.0,1.0),0.45); gl_FragColor = vec4(mix(uHori,uTop,t),1.0); }`
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(900, 32, 16), skyMat));

// ─── Stars ────────────────────────────────────────────────────────────────────
const STAR_N = IS_MOBILE ? 1200 : 2500;
const starPos = new Float32Array(STAR_N * 3);
for (let i = 0; i < STAR_N; i++) {
  const theta = Math.random() * Math.PI * 2, phi = Math.acos(Math.random() * 0.85), r = 750 + Math.random() * 50;
  starPos[i*3] = r*Math.sin(phi)*Math.cos(theta); starPos[i*3+1] = r*Math.cos(phi); starPos[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.4, transparent: true, opacity: 0, sizeAttenuation: true });
scene.add(new THREE.Points(starGeo, starMat));

// ─── Ground ───────────────────────────────────────────────────────────────────
const ground = new THREE.Mesh(new THREE.PlaneGeometry(1200, 1200), toon(0xa08860));
ground.rotation.x = -Math.PI / 2;
ground.position.y = -13;
ground.receiveShadow = !IS_MOBILE;
scene.add(ground);

// ─── Wheel assembly ───────────────────────────────────────────────────────────
const wheelGroup = new THREE.Group();
wheelGroup.position.set(HR_X, 0, HR_Z);
scene.add(wheelGroup);

// Rim
const rimMat = new THREE.MeshToonMaterial({
  color: 0x334477, gradientMap: toonGrad,
  emissive: new THREE.Color(0x1133bb), emissiveIntensity: 0.35
});
const rimMesh = new THREE.Mesh(new THREE.TorusGeometry(12, 0.15, 16, 120), rimMat);
wheelGroup.add(rimMesh);

// Hub
const hubMat = new THREE.MeshToonMaterial({
  color: 0x445588, gradientMap: toonGrad,
  emissive: new THREE.Color(0x4466dd), emissiveIntensity: 0.5
});
const hubMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 1.8, 16), hubMat);
hubMesh.rotation.x = Math.PI / 2;
addEdges(hubMesh, 0x6699ff, 20);
wheelGroup.add(hubMesh);

// Spokes
const spokeMat = toon(0x445566);
for (let i = 0; i < 28; i++) {
  const a = (i / 28) * Math.PI * 2;
  const spoke = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 12, 5), spokeMat);
  spoke.position.set(Math.cos(a) * 6, Math.sin(a) * 6, 0);
  spoke.rotation.z = a - Math.PI / 2;
  wheelGroup.add(spoke);
}

// Tripod (static — added to scene, not wheelGroup)
const supportMat = toon(0x334455);
[0, (2*Math.PI/3), (4*Math.PI/3)].forEach(a => {
  const top = new THREE.Vector3(HR_X, 0, HR_Z);
  const bot = new THREE.Vector3(HR_X + Math.cos(a) * 7, -13, HR_Z + Math.sin(a) * 7);
  const dir = new THREE.Vector3().subVectors(top, bot).normalize();
  const len = top.distanceTo(bot);
  const mid = new THREE.Vector3().lerpVectors(top, bot, 0.5);
  const sup = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.28, len, 8), supportMat);
  sup.position.copy(mid);
  sup.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
  if (!IS_MOBILE) sup.castShadow = true;
  addEdges(sup, 0x3355cc, 20);
  scene.add(sup);
});

// ─── Pods (world space, stay upright) ────────────────────────────────────────
const POD_N = 28;
const POD_COLORS = [
  new THREE.Color(0.55, 0.0, 1.0),
  new THREE.Color(0.0, 0.35, 1.0),
  new THREE.Color(1.0, 0.1, 0.65),
  new THREE.Color(1.0, 0.0, 0.85),
];
const _tc = new THREE.Color();
const pods = [];
const podLightEvery = IS_MOBILE ? 2 : 1;

for (let i = 0; i < POD_N; i++) {
  const baseAngle = (i / POD_N) * Math.PI * 2;
  const mat = new THREE.MeshToonMaterial({
    color: 0x223344, gradientMap: toonGrad,
    emissive: POD_COLORS[0].clone(), emissiveIntensity: 1.2
  });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.45, 12, 8), mat);
  mesh.position.set(HR_X + Math.cos(baseAngle) * 12, Math.sin(baseAngle) * 12, HR_Z);
  scene.add(mesh);
  let light = null;
  if (i % podLightEvery === 0) {
    light = new THREE.PointLight(0xaa00ff, 0.9, 6);
    light.position.copy(mesh.position);
    scene.add(light);
  }
  pods.push({ mesh, light, baseAngle, phase: i / POD_N });
}

// ─── Billboards ───────────────────────────────────────────────────────────────
const texLoader = new THREE.TextureLoader();
const clickables = []; // { mesh, name, venue, url }

function makeBillboard(dataUrl, x, y, z, w, h, name, venue, url) {
  const grp = new THREE.Group();

  // Backing frame
  const frame = new THREE.Mesh(new THREE.BoxGeometry(w + 0.6, h + 0.6, 0.3), toon(0x0a0a1e));
  addEdges(frame, 0x4488ff, 5);
  frame.position.y = h / 2;
  grp.add(frame);

  // Poster plane — registered as clickable
  const tex = texLoader.load(dataUrl);
  tex.encoding = THREE.sRGBEncoding;
  const poster = new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    new THREE.MeshBasicMaterial({ map: tex })
  );
  poster.position.set(0, h / 2, 0.2);
  grp.add(poster);
  clickables.push({ mesh: poster, name, venue, url });

  // Support pole
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.14, h + 6, 8), toon(0x223344));
  addEdges(pole, 0x3366cc, 20);
  pole.position.y = h / 2 - 3;
  grp.add(pole);

  // Neon top accent strip
  const stripMat = new THREE.MeshToonMaterial({ color: 0x0022ff, gradientMap: toonGrad, emissive: new THREE.Color(0x2255ff), emissiveIntensity: 1.5 });
  const strip = new THREE.Mesh(new THREE.BoxGeometry(w + 0.6, 0.18, 0.4), stripMat);
  strip.position.y = h + 0.39;
  grp.add(strip);

  grp.position.set(x, y, z);
  grp.lookAt(28, y + h / 2, 28);
  scene.add(grp);
  return grp;
}

// ─── Raycaster & billboard interaction ───────────────────────────────────────
const raycaster = new THREE.Raycaster();
const _mouse = new THREE.Vector2();

function getPointerNDC(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  _mouse.x =  ((clientX - r.left) / r.width)  * 2 - 1;
  _mouse.y = -((clientY - r.top)  / r.height) * 2 + 1;
}

function hitTest() {
  raycaster.setFromCamera(_mouse, camera);
  const hits = raycaster.intersectObjects(clickables.map(c => c.mesh));
  return hits.length ? clickables.find(c => c.mesh === hits[0].object) : null;
}

canvas.addEventListener('click', e => {
  getPointerNDC(e.clientX, e.clientY);
  const hit = hitTest();
  if (hit) showPopup(hit);
});
canvas.addEventListener('touchend', e => {
  if (e.changedTouches.length) {
    getPointerNDC(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    const hit = hitTest();
    if (hit) { e.preventDefault(); showPopup(hit); }
  }
}, { passive: false });
canvas.addEventListener('mousemove', e => {
  getPointerNDC(e.clientX, e.clientY);
  canvas.style.cursor = hitTest() ? 'pointer' : 'default';
});

function showPopup(hit) {
  document.getElementById('bb-name').textContent = hit.name;
  document.getElementById('bb-sub').textContent  = hit.venue;
  document.getElementById('bb-link').href        = hit.url;
  document.getElementById('bb-popup').classList.add('visible');
}
function closePopup() {
  document.getElementById('bb-popup').classList.remove('visible');
}

// ─── Las Vegas Strip road ─────────────────────────────────────────────────────
(function makeLVStrip() {
  // Road runs from south of Luxor through the High Roller area
  // Angle aligns with Luxor-sphinx → High-Roller direction: dx=55, dz=32
  const ANGLE   = Math.atan2(55, 32);
  const cos_a   = Math.cos(ANGLE), sin_a = Math.sin(ANGLE);
  // Center point: midway between Luxor front and High Roller, offset toward camera
  const CX = -20, CZ = -10;
  const GROUND  = -12.85;  // road surface sits just above ground plane (-13)
  const ROAD_LEN = 280, ROAD_W = 11, SIDE_W = 4;

  // Convert road-local (lx along width-axis, lz along length-axis) to world XZ
  function toWorld(lx, lz) {
    return [CX + lx * cos_a + lz * sin_a,
            CZ - lx * sin_a + lz * cos_a];
  }
  function roadBox(w, h, d, lx, wy, lz, mat) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    const [wx, wz] = toWorld(lx, lz);
    m.position.set(wx, wy, wz);
    m.rotation.y = ANGLE;
    scene.add(m);
    return m;
  }

  // Asphalt surface
  const asphaltMat = toon(0x1c1c26);
  roadBox(ROAD_W, 0.28, ROAD_LEN, 0, GROUND, 0, asphaltMat);

  // Sidewalks (slightly higher than road)
  const sidewalkMat = toon(0x2e2e40);
  roadBox(SIDE_W, 0.32, ROAD_LEN, -(ROAD_W / 2 + SIDE_W / 2), GROUND + 0.02, 0, sidewalkMat);
  roadBox(SIDE_W, 0.32, ROAD_LEN,  (ROAD_W / 2 + SIDE_W / 2), GROUND + 0.02, 0, sidewalkMat);

  // Yellow center divider (emissive glow)
  const centerMat = new THREE.MeshToonMaterial({
    color: 0xffcc00, emissive: 0xffcc00, emissiveIntensity: 0.5, gradientMap: toonGrad
  });
  roadBox(0.22, 0.3, ROAD_LEN, 0, GROUND + 0.02, 0, centerMat);

  // White lane dashes (2 lanes each side of center)
  if (!IS_MOBILE) {
    const dashMat = new THREE.MeshToonMaterial({
      color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.35, gradientMap: toonGrad
    });
    const DASH = 3.5, GAP = 7, LANE_X = 2.9;
    for (let z = -(ROAD_LEN / 2 - 5); z < ROAD_LEN / 2 - 5; z += DASH + GAP) {
      roadBox(0.14, 0.3, DASH, -LANE_X, GROUND + 0.02, z, dashMat);
      roadBox(0.14, 0.3, DASH,  LANE_X, GROUND + 0.02, z, dashMat);
    }
  }

  // Streetlights every 35 units, both sides
  const poleMat = toon(0x445566);
  const lampMat = new THREE.MeshToonMaterial({
    color: 0xff9933, emissive: 0xff8800, emissiveIntensity: 1.4, gradientMap: toonGrad
  });
  const POLE_H = 7, LIGHT_OFF = ROAD_W / 2 + SIDE_W + 0.8;
  for (let z = -(ROAD_LEN / 2 - 18); z < ROAD_LEN / 2 - 10; z += 35) {
    [-1, 1].forEach(side => {
      const lx = side * LIGHT_OFF;
      const [wx, wz] = toWorld(lx, z);
      const py = GROUND + POLE_H / 2 + 0.14;
      const ly = GROUND + POLE_H + 0.5;

      const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.18, POLE_H, 6), poleMat);
      pole.position.set(wx, py, wz);
      scene.add(pole);

      const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.45, 6, 4), lampMat);
      lamp.position.set(wx, ly, wz);
      scene.add(lamp);

      const pl = new THREE.PointLight(0xff9944, 0.8, 20);
      pl.position.set(wx, ly, wz);
      scene.add(pl);
      buildingLights.push(pl);  // managed by applyTOD
    });
  }
})();

const todState = { rimBase: 0.35, podGlow: 0.08, beamOpacity: 0.33, apexIntensity: 4.5 };
let lightOverride = null;

function applyTOD(phase) {
  const n=phase==='night', d=phase==='dusk', g=phase==='golden', s=phase==='sunrise', dy=phase==='day';
  if (dy) { skyMat.uniforms.uTop.value.set(0x1a6bdc); skyMat.uniforms.uHori.value.set(0x87ceeb); }
  else if (s) { skyMat.uniforms.uTop.value.set(0x2233aa); skyMat.uniforms.uHori.value.set(0xff7733); }
  else if (g) { skyMat.uniforms.uTop.value.set(0x1a2299); skyMat.uniforms.uHori.value.set(0xff8833); }
  else if (d) { skyMat.uniforms.uTop.value.set(0x0d0d66); skyMat.uniforms.uHori.value.set(0x2233aa); }
  else        { skyMat.uniforms.uTop.value.set(0x050514); skyMat.uniforms.uHori.value.set(0x121230); }

  sunLight.intensity  = dy ? 2.2 : s ? 0.9 : g ? 1.3 : d ? 0.4 : 0.0;
  sunLight.color.setHex(dy ? 0xffffff : s ? 0xff8844 : g ? 0xffbb44 : d ? 0x6688cc : 0x111122);
  ambientLight.intensity = dy ? 0.55 : s ? 0.3 : g ? 0.35 : d ? 0.25 : 0.5;
  ambientLight.color.setHex(dy ? 0x8899cc : s ? 0xdd8866 : g ? 0xcc9944 : d ? 0x445577 : 0x5566aa);
  moonLight.intensity = n ? 0.35 : d ? 0.1 : 0.0;

  starMat.opacity = n ? 1.0 : d ? 0.35 : 0.0;
  bloomPass.strength = n ? (IS_MOBILE?1.0:2.2) : (d||g) ? (IS_MOBILE?0.5:1.1) : (IS_MOBILE?0.15:0.45);

  // Building warm lights: brighter at night
  const bLightIntensity = n ? 1.8 : (d||g) ? 1.3 : 0.7;
  buildingLights.forEach(l => { l.intensity = bLightIntensity; });

  todState.podGlow = n ? 1.3 : (d||g) ? 0.65 : 0.08;
  pods.forEach(p => {
    if (p.light) p.light.intensity = todState.podGlow;
    p.mesh.material.emissiveIntensity = n ? 1.4 : (d||g) ? 0.9 : 0.18;
  });

  todState.rimBase = n ? 0.45 : (d||g) ? 0.28 : 0.06;
  rimMat.emissiveIntensity = todState.rimBase;
  rimMat.emissive.setHex(n ? 0x2244ff : 0x1122aa);
  scene.fog.color.setHex(n ? 0x0d0d28 : dy ? 0xaaddff : 0x1a1a4e);
  // Luxor beam — full blaze at night, barely visible by day
  todState.beamOpacity   = n ? 0.33 : (d||g) ? 0.20 : 0.05;
  todState.apexIntensity = n ? 5.5  : (d||g) ? 2.5  : 0.4;
  beamMat.opacity   = todState.beamOpacity;
  apexGlow.intensity = todState.apexIntensity;
  apexBloom.intensity = n ? 8 : (d||g) ? 4 : 0.5;
}

// ─── Camera modes ────────────────────────────────────────────────────────────
let autoTourOn = false, cinematicOn = false, tourT = 0, cinT = 0;
function toggleAutoTour() {
  autoTourOn = !autoTourOn; cinematicOn = false; tourT = 0;
  controls.enabled = !autoTourOn;
  document.getElementById('btn-tour').classList.toggle('active', autoTourOn);
  document.getElementById('btn-cin').classList.remove('active');
}
function toggleCinematic() {
  cinematicOn = !cinematicOn; autoTourOn = false; cinT = 0;
  controls.enabled = !cinematicOn;
  document.getElementById('btn-cin').classList.toggle('active', cinematicOn);
  document.getElementById('btn-tour').classList.remove('active');
}
function toggleLights() {
  lightOverride = lightOverride===null ? 'night' : lightOverride==='night' ? 'day' : null;
  applyTOD(lightOverride !== null ? lightOverride : getTODPhase(getLVHour()));
}
function resetCamera() {
  autoTourOn = cinematicOn = false;
  controls.enabled = true;
  camera.position.copy(CAM_DEFAULT);
  controls.target.set(-12, 2, -15);
  controls.update();
  document.getElementById('btn-tour').classList.remove('active');
  document.getElementById('btn-cin').classList.remove('active');
}

// ─── Animation loop ──────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let wheelAngle = 0;
const WHEEL_SPEED = (Math.PI * 2) / 90;

applyTOD(getTODPhase(getLVHour()));
document.getElementById('clock-text').textContent = getLVTimeStr();
setInterval(() => { document.getElementById('clock-text').textContent = getLVTimeStr(); }, 15000);
let lastTODCheck = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta(), time = clock.getElapsedTime();
  if (lightOverride === null && time - lastTODCheck > 60) { lastTODCheck = time; applyTOD(getTODPhase(getLVHour())); }
  wheelAngle += dt * WHEEL_SPEED;
  wheelGroup.rotation.z = wheelAngle;
  pods.forEach(pod => {
    const wa = pod.baseAngle + wheelAngle;
    pod.mesh.position.set(HR_X + Math.cos(wa) * 12, Math.sin(wa) * 12, HR_Z);
    if (pod.light) pod.light.position.copy(pod.mesh.position);
    const t = ((time * 0.2) + pod.phase) % 1.0;
    const ci = Math.floor(t * 4) % 4, cf = (t * 4) % 1.0;
    _tc.copy(POD_COLORS[ci]).lerp(POD_COLORS[(ci+1)%4], cf);
    pod.mesh.material.emissive.copy(_tc);
    if (pod.light) pod.light.color.copy(_tc);
  });
  rimMat.emissiveIntensity = todState.rimBase * (0.75 + 0.5 * Math.sin(time * 1.7));
  hubGlow.intensity = 2.0 + Math.sin(time * 2.3) * 0.6;
  // Luxor beam subtle atmospheric shimmer
  beamMat.opacity = todState.beamOpacity * (0.82 + 0.28 * Math.sin(time * 2.9));
  if (autoTourOn) {
    tourT += dt;
    camera.position.set(Math.cos(tourT*0.22)*(32+Math.sin(tourT*0.18)*12) - 10, 6+Math.sin(tourT*0.14)*10, Math.sin(tourT*0.22)*(32+Math.sin(tourT*0.18)*12) - 18);
    camera.lookAt(-10, 4, -18);
  }
  if (cinematicOn) {
    cinT += dt;
    camera.position.set(Math.cos(cinT*0.09)*22 + HR_X, -8, Math.sin(cinT*0.09)*22 + HR_Z);
    camera.lookAt(HR_X, 12, HR_Z);
  }
  if (!autoTourOn && !cinematicOn) controls.update();
  composer.render();
}

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h; camera.updateProjectionMatrix();
  renderer.setSize(w, h); composer.setSize(w, h);
});
window.addEventListener('load', () => {
  setTimeout(() => { const ld = document.getElementById('loading'); ld.classList.add('fade'); setTimeout(() => ld.remove(), 1100); }, 1000);
});
animate();
