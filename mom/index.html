<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Something Special For You 🌸</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #FAF3E8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow: hidden;
    }

    .petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .petal {
      position: absolute;
      top: -40px;
      font-size: 1.4rem;
      animation: fall linear infinite;
      opacity: 0.6;
    }
    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.7; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .gate {
      position: relative;
      z-index: 1;
      background: white;
      border-radius: 20px;
      padding: 52px 44px 44px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 60px rgba(201,122,130,0.18), 0 2px 12px rgba(0,0,0,0.06);
      border: 1px solid rgba(201,122,130,0.15);
    }

    .flower { font-size: 3.2rem; margin-bottom: 18px; display: block; }

    .gate h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      color: #3D2B1F;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .gate p {
      font-size: 1.05rem;
      color: #6B4C3B;
      margin-bottom: 32px;
      line-height: 1.6;
      font-weight: 300;
    }

    .input-wrap { position: relative; margin-bottom: 14px; }

    input[type="password"] {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #E8B4B8;
      border-radius: 12px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      color: #3D2B1F;
      background: #FAF3E8;
      outline: none;
      text-align: center;
      letter-spacing: 0.12em;
      transition: border-color 0.2s;
    }
    input[type="password"]::placeholder { letter-spacing: 0.05em; color: #C4A4A8; }
    input[type="password"]:focus { border-color: #C97A82; }
    input.error { border-color: #e05f5f; animation: shake 0.35s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-8px); }
      75%      { transform: translateX(8px); }
    }

    .err-msg {
      font-size: 0.85rem;
      color: #b94a4a;
      min-height: 20px;
      margin-bottom: 18px;
      font-style: italic;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #C97A82;
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.04em;
    }
    button:hover { background: #b5686f; transform: translateY(-1px); }

    .hint {
      margin-top: 22px;
      font-size: 0.82rem;
      color: #C4A4A8;
      font-style: italic;
    }

    /* Full-screen iframe shown after unlock */
    #surprise-frame {
      display: none;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 999;
    }
  </style>
</head>
<body>

<div class="petals" id="petals"></div>

<div class="gate" id="gate">
  <span class="flower">🌸</span>
  <h1>Something special<br>is waiting for you</h1>
  <p>Someone who loves you very much<br>left something here.</p>
  <div class="input-wrap">
    <input type="password" id="pw" placeholder="Enter the secret password" autocomplete="off" />
  </div>
  <div class="err-msg" id="err"></div>
  <button onclick="checkPassword()">Open →</button>
  <div class="hint">Psst — it's two words 🤫</div>
</div>

<iframe id="surprise-frame" title="Something special for you"></iframe>

<script>
  /* Falling petals */
  const petals = document.getElementById('petals');
  const symbols = ['🌸','🌹','🌺','🌷','✿'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.fontSize = (1 + Math.random() * 0.8) + 'rem';
    petals.appendChild(p);
  }

  /* Password check */
  function checkPassword() {
    const val = document.getElementById('pw').value.trim();
    const inp = document.getElementById('pw');
    const err = document.getElementById('err');

    if (val.toLowerCase() === 'himom') {
      document.getElementById('gate').style.display = 'none';
      petals.style.display = 'none';
      const frame = document.getElementById('surprise-frame');
      frame.src = '/mom/surprise.html';
      frame.style.display = 'block';
    } else {
      inp.classList.add('error');
      err.textContent = 'That\'s not it — try again 🌸';
      setTimeout(() => { inp.classList.remove('error'); inp.value = ''; }, 350);
    }
  }

  document.getElementById('pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
    document.getElementById('err').textContent = '';
  });
</script>
</body>
</html>
