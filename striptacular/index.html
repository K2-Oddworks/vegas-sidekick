<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STRIPTACULAR — The Las Vegas Strip (Layout)</title>
<meta name="description" content="An interactive 3D layout of the Las Vegas Strip — Las Vegas Blvd from the Welcome sign to the STRAT. By Vegas Sidekick.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;600;700&family=Kaushan+Script&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#0A1628; --blue:#1A6BFF; --blue-lt:#60a5fa; --orange:#FF6B2B; --white:#fff;
    --glass:rgba(12,26,48,.62); --glass-brd:rgba(96,165,250,.28); }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#05070d;color:#fff;font-family:'Barlow',system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
  #app{position:fixed;inset:0} canvas{display:block}
  #loader{position:fixed;inset:0;z-index:100;background:radial-gradient(120% 100% at 50% 40%,#12294d 0%,#060a14 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .8s ease}
  #loader.hide{opacity:0;pointer-events:none}
  .loadmark{font-family:'Bebas Neue',sans-serif;font-size:clamp(46px,11vw,120px);letter-spacing:4px;line-height:.9;background:linear-gradient(92deg,#ff6b2b,#ffd36b 40%,#60a5fa 75%,#c084fc);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 26px rgba(96,165,250,.45));text-align:center}
  .loadsub{font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:5px;text-transform:uppercase;font-size:clamp(11px,2.5vw,15px);color:#9fb6d6}
  .loadbar{width:min(260px,60vw);height:4px;border-radius:4px;background:rgba(255,255,255,.12);overflow:hidden}
  .loadbar>i{display:block;height:100%;width:35%;border-radius:4px;background:linear-gradient(90deg,#ff6b2b,#60a5fa);animation:load 1.1s ease-in-out infinite}
  @keyframes load{0%{transform:translateX(-120%)}100%{transform:translateX(360%)}}
  .hud{position:fixed;z-index:20;pointer-events:none} .hud *{pointer-events:auto}
  #brand{top:16px;left:18px}
  #brand .mark{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:.85;letter-spacing:2px;background:linear-gradient(92deg,#ff6b2b,#ffd36b 45%,#60a5fa);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 14px rgba(96,165,250,.35))}
  #brand .tag{font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:3px;text-transform:uppercase;font-size:10px;color:#8ea6c8;margin-top:2px}
  #cams{top:16px;right:16px;display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;max-width:60vw}
  .cbtn{font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-size:12px;color:#cfe0f5;background:var(--glass);border:1px solid var(--glass-brd);border-radius:11px;padding:9px 13px;cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:center;gap:7px;transition:.18s;white-space:nowrap}
  .cbtn:hover{border-color:var(--blue-lt);color:#fff;transform:translateY(-1px)}
  .cbtn.on{background:linear-gradient(180deg,#ff7d43,#ff6b2b);color:#0A1628;border-color:#ffd0b3;box-shadow:0 0 18px rgba(255,107,43,.5)}
  .cbtn .ic{font-size:15px;line-height:1}
  #reset{top:64px;left:18px;font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;font-size:13px;color:#0A1628;background:linear-gradient(180deg,#ffd36b,#ffb020);border:1px solid #ffe6a8;border-radius:11px;padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 0 20px rgba(255,176,32,.45);transition:.16s}
  #reset:hover{transform:translateY(-1px);box-shadow:0 0 28px rgba(255,176,32,.7)}
  #timebar{left:50%;bottom:20px;transform:translateX(-50%);width:min(560px,92vw);background:var(--glass);border:1px solid var(--glass-brd);border-radius:16px;padding:12px 16px 14px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 12px 40px rgba(0,0,0,.45)}
  #timebar .row{display:flex;align-items:center;gap:12px}
  #timebar .phase{font-size:20px;width:26px;text-align:center;filter:drop-shadow(0 0 8px rgba(255,220,120,.5))}
  #clock{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#cfe0f5;min-width:78px;text-align:center;background:rgba(0,0,0,.25);border-radius:8px;padding:5px 8px}
  #sound{flex:none;width:34px;height:34px;border-radius:9px;background:rgba(0,0,0,.25);border:1px solid var(--glass-brd);color:#cfe0f5;font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.16s}
  #sound:hover{border-color:var(--blue-lt);color:#fff}
  #sound.on{background:linear-gradient(180deg,#ff7d43,#ff6b2b);color:#0A1628;border-color:#ffd0b3;box-shadow:0 0 14px rgba(255,107,43,.5)}
  input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:6px;flex:1;outline:none;background:linear-gradient(90deg,#0b1830,#254a86 25%,#7fb0ff 50%,#ffd36b 72%,#ff8a3d 88%,#2a1a3a);cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid var(--orange);box-shadow:0 0 12px rgba(255,107,43,.7);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid var(--orange);cursor:pointer}
  #timebar .lab{font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;font-size:10px;color:#8ea6c8;text-align:center;margin-top:7px}
  #legend{left:18px;bottom:20px;background:var(--glass);border:1px solid var(--glass-brd);border-radius:14px;padding:11px 13px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  #legend h4{font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:2px;text-transform:uppercase;font-size:11px;color:#cfe0f5;margin-bottom:8px}
  #legend .row{display:flex;align-items:center;gap:7px;font-size:12px;color:#b7c8df;margin-bottom:4px}
  #legend .sw{width:12px;height:12px;border-radius:3px;flex:none}
  @media (max-width:760px){ #legend{display:none} }
  #hint{left:50%;bottom:104px;transform:translateX(-50%);display:flex;align-items:center;gap:9px;background:rgba(12,26,48,.8);border:1px solid var(--glass-brd);border-radius:999px;padding:8px 15px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.6px;font-size:13px;color:#dbe8fb;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 8px 26px rgba(0,0,0,.4);opacity:0;transition:opacity .6s ease;text-align:center}
  #hint.show{opacity:1} #hint .u{color:#ffd36b}
  #info{position:fixed;z-index:30;top:0;right:0;height:100%;width:min(380px,88vw);background:linear-gradient(180deg,rgba(10,22,40,.95),rgba(8,16,30,.97));border-left:1px solid var(--glass-brd);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transform:translateX(105%);transition:transform .5s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;box-shadow:-18px 0 50px rgba(0,0,0,.5)}
  #info.open{transform:translateX(0)}
  #info .ihero{height:120px;position:relative;overflow:hidden;flex:none;background:radial-gradient(120% 120% at 70% 20%,#3a2b6e,#0d1428);display:flex;align-items:flex-end}
  #info .ihero .bar{position:absolute;top:0;left:0;right:0;height:6px}
  #info .ihero h2{position:relative;z-index:2;font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:1px;padding:0 20px 12px;line-height:.9;text-shadow:0 2px 20px rgba(0,0,0,.6)}
  #info .ibody{padding:20px;overflow-y:auto;flex:1}
  #info .kicker{font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:3px;text-transform:uppercase;font-size:11px;color:var(--orange);margin-bottom:10px}
  #info p{color:#c4d3e8;line-height:1.6;font-size:14.5px;margin-bottom:14px}
  #info .facts{list-style:none;display:grid;gap:9px;margin:6px 0 20px}
  #info .facts li{display:flex;gap:10px;align-items:center;font-size:13.5px;color:#b7c8df;padding:9px 11px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px}
  #info .status{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:2px;text-transform:uppercase;font-size:11px;padding:6px 12px;border-radius:999px}
  .xbtn{position:absolute;top:12px;right:12px;z-index:3;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.18s}
  .xbtn:hover{background:rgba(255,107,43,.85);border-color:#fff}
  @media (max-width:600px){ #brand .mark{font-size:26px} #cams .lbl{display:none} .cbtn .ic{font-size:17px} #reset{top:58px} }
</style>
</head>
<body>
<div id="app"></div>
<div id="loader"><div class="loadmark">STRIPTACULAR</div><div class="loadsub">Laying out the Strip…</div><div class="loadbar"><i></i></div></div>

<div class="hud" id="brand"><div class="mark">STRIPTACULAR</div><div class="tag">The Strip · Layout · Vegas Sidekick</div></div>
<button class="hud" id="reset">⟲ <span>South · Face North</span></button>
<div class="hud" id="cams">
  <button class="cbtn on" data-mode="orbit"><span class="ic">🛰️</span><span class="lbl">Overview</span></button>
  <button class="cbtn" data-mode="fly"><span class="ic">🚁</span><span class="lbl">Fly Tour</span></button>
  <button class="cbtn" data-mode="limo"><span class="ic">🚗</span><span class="lbl">Limo Tour</span></button>
</div>
<div class="hud" id="legend">
  <h4>The Strip · S → N</h4>
  <div class="row"><span class="sw" style="background:#ffb020"></span>Icon</div>
  <div class="row"><span class="sw" style="background:#2f7bd6"></span>Mega-resort</div>
  <div class="row"><span class="sw" style="background:#ff7a3d"></span>Classic</div>
  <div class="row"><span class="sw" style="background:#18b7a6"></span>Venue</div>
  <div class="row"><span class="sw" style="background:#8a93a3"></span>Off-Strip</div>
</div>
<div class="hud" id="timebar">
  <div class="row"><span class="phase" id="phase">🌙</span><input type="range" id="time" min="0" max="24" step="0.05" value="20.5"><span id="clock">8:30 PM</span><button id="sound" aria-label="Toggle ambient sound" title="Ambient sound">🔇</button></div>
  <div class="lab">Time of Day · drag to change the sky &amp; the neon</div>
</div>
<div class="hud" id="hint"><span>👀</span><span>Click any <span class="u">lot</span> for details · <span class="u">Fly</span> / <span class="u">Limo</span> to cruise · <span class="u">⟲</span> to reset · <span class="u">🔊</span> sound</span></div>
<aside id="info">
  <button class="xbtn" data-close="info">✕</button>
  <div class="ihero"><div class="bar" id="info-bar"></div><h2 id="info-title">Property</h2></div>
  <div class="ibody"><div class="kicker" id="info-kicker"></div><p id="info-desc"></p><ul class="facts" id="info-facts"></ul><span class="status" id="info-status"></span></div>
</aside>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/Pass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/MaskPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script>
(function(){
"use strict";
if(typeof THREE==='undefined'){ document.getElementById('loader').innerHTML='<div class="loadmark">Offline</div><div class="loadsub">Could not load the 3D engine</div>'; return; }
const REDUCE=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const _fontRedraws=[]; function onFonts(fn){ _fontRedraws.push(fn); }
if(document.fonts&&document.fonts.ready) document.fonts.ready.then(()=>_fontRedraws.forEach(f=>{try{f();}catch(e){}}));

const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2)); renderer.setSize(window.innerWidth,window.innerHeight);
renderer.outputEncoding=THREE.sRGBEncoding; renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.05;
app.appendChild(renderer.domElement);
const scene=new THREE.Scene(); scene.fog=new THREE.FogExp2(0x0a1628,0.00035);
const camera=new THREE.PerspectiveCamera(52,window.innerWidth/window.innerHeight,1,16000);
const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.06; controls.minDistance=40; controls.maxDistance=5200; controls.maxPolarAngle=Math.PI*0.495;

const hemi=new THREE.HemisphereLight(0xbcd3ff,0x1a2438,0.6); scene.add(hemi);
const sun=new THREE.DirectionalLight(0xffffff,1.0); scene.add(sun); scene.add(sun.target);
const ambient=new THREE.AmbientLight(0x2a3350,0.3); scene.add(ambient);
const sky=new THREE.Mesh(new THREE.SphereGeometry(9000,32,16), new THREE.ShaderMaterial({side:THREE.BackSide,depthWrite:false,fog:false,
  uniforms:{top:{value:new THREE.Color(0x0a1a3a)},bot:{value:new THREE.Color(0x14243f)}},
  vertexShader:`varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
  fragmentShader:`uniform vec3 top; uniform vec3 bot; varying vec3 vP; void main(){ float h=normalize(vP).y; gl_FragColor=vec4(mix(bot,top,smoothstep(-0.15,0.55,h)),1.0);} `})); scene.add(sky);
const starGeo=new THREE.BufferGeometry(); const sN=2000,sPos=new Float32Array(sN*3);
for(let i=0;i<sN;i++){ const r=6000+Math.random()*2000,th=Math.random()*Math.PI*2,ph=Math.acos(Math.random()*0.9+0.05); sPos[i*3]=r*Math.sin(ph)*Math.cos(th);sPos[i*3+1]=r*Math.cos(ph);sPos[i*3+2]=r*Math.sin(ph)*Math.sin(th);}
starGeo.setAttribute('position',new THREE.BufferAttribute(sPos,3));
const starMat=new THREE.PointsMaterial({color:0xffffff,size:2.4,transparent:true,opacity:0,depthWrite:false,sizeAttenuation:false}); scene.add(new THREE.Points(starGeo,starMat));
const discMat=new THREE.MeshBasicMaterial({color:0xffffff,fog:false,transparent:true});
const disc=new THREE.Mesh(new THREE.CircleGeometry(180,40),discMat); scene.add(disc);
const ground=new THREE.Mesh(new THREE.PlaneGeometry(16000,16000),new THREE.MeshStandardMaterial({color:0x080b12,roughness:0.9,metalness:0.05})); ground.rotation.x=-Math.PI/2; ground.position.y=-0.2; scene.add(ground);

/* ===== Las Vegas Blvd — deep-black asphalt, glowing lines, streetlights ===== */
const LANE=11, MEDIAN=16, WALK=20, INNER=76;
const HALFCARR=LANE*3/2, CARR=MEDIAN/2+HALFCARR;
function laneTex(){
  const cw=192,ch=512,cv=document.createElement('canvas'); cv.width=cw; cv.height=ch; const x=cv.getContext('2d');
  const em=document.createElement('canvas'); em.width=cw; em.height=ch; const ex=em.getContext('2d');
  x.fillStyle='#050506'; x.fillRect(0,0,cw,ch); ex.fillStyle='#000'; ex.fillRect(0,0,cw,ch);
  x.fillStyle='#f4f6ff'; ex.fillStyle='#f4f6ff'; x.fillRect(3,0,5,ch); x.fillRect(cw-8,0,5,ch); ex.fillRect(3,0,5,ch); ex.fillRect(cw-8,0,5,ch); // solid edges
  for(const lx of [cw/3,2*cw/3]) for(let y=0;y<ch;y+=70){ x.fillStyle='#eef2ff'; x.fillRect(lx-3,y,6,40); ex.fillStyle='#eef2ff'; ex.fillRect(lx-3,y,6,40); } // dashes
  const t=new THREE.CanvasTexture(cv), e=new THREE.CanvasTexture(em);
  t.wrapT=e.wrapT=THREE.RepeatWrapping; t.wrapS=e.wrapS=THREE.ClampToEdgeWrapping; t.encoding=e.encoding=THREE.sRGBEncoding; t.anisotropy=e.anisotropy=4;
  return {map:t,em:e};
}
let ROAD_MATS=[]; let RZ0,RZ1,RLEN,RZC, STRAT_Z;
const yellowMats=[];
function buildRoad(){
  const tile=70;
  for(const s of [-1,1]){
    const lt=laneTex(); lt.map.repeat.set(1,RLEN/tile); lt.em.repeat.set(1,RLEN/tile);
    const rm=new THREE.MeshStandardMaterial({map:lt.map,emissiveMap:lt.em,emissive:0xffffff,emissiveIntensity:0.15,roughness:0.85,metalness:0.0});
    ROAD_MATS.push(rm);
    const carr=new THREE.Mesh(new THREE.PlaneGeometry(LANE*3,RLEN),rm); carr.rotation.x=-Math.PI/2; carr.position.set(s*CARR,0.02,RZC); scene.add(carr);
    const walk=new THREE.Mesh(new THREE.PlaneGeometry(WALK,RLEN),new THREE.MeshStandardMaterial({color:0x24272e,roughness:0.92})); walk.rotation.x=-Math.PI/2; walk.position.set(s*(CARR+HALFCARR+WALK/2),0.008,RZC); scene.add(walk);
    // glowing double-yellow line along the median edge
    const ym=new THREE.MeshStandardMaterial({color:0x5a4200,emissive:0xffcf1a,emissiveIntensity:1.6,roughness:0.5}); yellowMats.push(ym);
    const yl=new THREE.Mesh(new THREE.PlaneGeometry(1.1,RLEN),ym); yl.rotation.x=-Math.PI/2; yl.position.set(s*(MEDIAN/2+1.4),0.05,RZC); scene.add(yl);
  }
  const med=new THREE.Mesh(new THREE.BoxGeometry(MEDIAN,1.4,RLEN),new THREE.MeshStandardMaterial({color:0x122018,roughness:0.85,emissive:0x0a2c1c,emissiveIntensity:0.25}));
  med.position.set(0,0.7,RZC); scene.add(med);
  // palms + streetlights
  const trunk=new THREE.MeshStandardMaterial({color:0x4a3a26,roughness:0.9});
  const frond=new THREE.MeshStandardMaterial({color:0x1f7a43,roughness:0.7,emissive:0x0c3a1e,emissiveIntensity:0.25});
  const poleMat=new THREE.MeshStandardMaterial({color:0x1a1d24,roughness:0.6,metalness:0.4});
  const headMat=new THREE.MeshStandardMaterial({color:0x2a2410,emissive:0xffdf9c,emissiveIntensity:2.4,roughness:0.4}); lampMats.push(headMat);
  for(let z=RZ0+90; z<RZ1-90; z+=110){
    if(!(z>-140&&z<90) && Math.abs(z-STRAT_Z)>90){   // keep the median clear at the Welcome sign + STRAT
      const pg=new THREE.Group(); const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.9,17,7),trunk); tr.position.y=8.5; pg.add(tr);
      const fr=new THREE.Mesh(new THREE.SphereGeometry(4.2,8,6),frond); fr.scale.set(1,0.5,1); fr.position.y=17.5; pg.add(fr); pg.position.set(0,0,z); scene.add(pg);
    }
    for(const s of [-1,1]){ // street lamps on both sidewalks
      const lg=new THREE.Group(); const p=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.5,14,8),poleMat); p.position.y=7; lg.add(p);
      const arm=new THREE.Mesh(new THREE.BoxGeometry(3,0.3,0.3),poleMat); arm.position.set(-s*1.6,13.8,0); lg.add(arm);
      const head=new THREE.Mesh(new THREE.SphereGeometry(0.85,12,10),headMat); head.position.set(-s*3,13.6,0); lg.add(head);
      lg.position.set(s*(CARR+HALFCARR+WALK*0.5),0,z+55); scene.add(lg);
    }
  }
}
const lampMats=[];

/* ===== Properties (comprehensive, from the map · present-day) ===== */
const CATC={mega:0x2f7bd6,icon:0xffb020,classic:0xff7a3d,venue:0x18b7a6,off:0x8a93a3};
const CATN={mega:'Mega-Resort',icon:'Icon',classic:'Classic',venue:'Venue',off:'Off-Strip'};
// {n, side:'W'|'E'|'C', cat, z, w(frontage), d(depth), h, note, set(back setback), sign}
const DATA=[
  {n:'Welcome to Las Vegas',side:'C',cat:'icon',z:0,w:34,d:20,h:40,note:'The famous sign — our south anchor. Betty Willis, 1959.',sign:true},
  {n:'Allegiant Stadium',side:'W',cat:'off',z:300,w:220,d:200,h:80,set:360,note:'Home of the Raiders (off-Strip, west).'},
  {n:'Four Seasons',side:'W',cat:'mega',z:300,w:120,d:120,h:120,set:170,note:'Atop Mandalay Bay’s south tower.'},

  sky.material.uniforms.top.value.copy(lk(a,b,f,'top')); sky.material.uniforms.bot.value.copy(lk(a,b,f,'bot')); scene.fog.color.copy(lk(a,b,f,'fog')); sun.color.copy(lk(a,b,f,'sun'));
  nightFactor=THREE.MathUtils.lerp(a.night,b.night,f); const D=4200;
  if(e>=0){ sun.position.set(horiz*D,Math.max(20,e*D),0.3*D); sun.intensity=THREE.MathUtils.lerp(a.si,b.si,f); discMat.color.setHex(0xfff2d0); }
  else { sun.position.set(-horiz*D,Math.max(20,-e*D),-0.3*D); sun.intensity=0.2+0.12*(-e); sun.color.setHex(0x9fb6e6); discMat.color.setHex(0xdfe8ff); }
  sun.target.position.set(0,0,RZC); disc.position.copy(sun.position).multiplyScalar(1.8);
  ambient.intensity=THREE.MathUtils.lerp(a.amb,b.amb,f); hemi.intensity=THREE.MathUtils.lerp(a.hemi,b.hemi,f);
  starMat.opacity=THREE.MathUtils.clamp((nightFactor-0.35)/0.5,0,1)*0.9;
  const litB=0.22+nightFactor*0.9; for(let k=0;k<bodies.length;k++) bodies[k].emissiveIntensity=litB;
  for(const m of ROAD_MATS) m.emissiveIntensity=0.05+nightFactor*0.7;
  for(const m of yellowMats) m.emissiveIntensity=0.5+nightFactor*1.6;
  for(const m of lampMats) m.emissiveIntensity=0.4+nightFactor*2.4;
  if(bloom) bloom.strength=0.4+nightFactor*0.7;
  const em=e>0.32?'☀️':e>0.02?'🌇':e>-0.12?'🌆':'🌙'; document.getElementById('phase').textContent=em; document.getElementById('clock').textContent=fmtClock(t);
}
function fmtClock(t){let h=Math.floor(t)%24;const m=Math.floor((t-Math.floor(t))*60);const ap=h<12?'AM':'PM';let hh=h%12;if(hh===0)hh=12;return hh+':'+String(m).padStart(2,'0')+' '+ap;}
const timeInput=document.getElementById('time');let timeOfDay=parseFloat(timeInput.value);
timeInput.addEventListener('input',e=>{timeOfDay=parseFloat(e.target.value);updateTime(timeOfDay);});

/* ===== Build world ===== */
STRAT_Z=DATA[DATA.length-1].z; RZ0=-360; RZ1=STRAT_Z+260; RLEN=RZ1-RZ0; RZC=(RZ0+RZ1)/2;
buildRoad();
DATA.forEach(addProp);

/* ===== Camera: default = south end facing north ===== */
const HOME_POS=new THREE.Vector3(0,30,-92), HOME_TGT=new THREE.Vector3(0,19,64);
camera.position.copy(HOME_POS); controls.target.copy(HOME_TGT); controls.update();
let mode='orbit', tourU=0, tween=null;
const camBtns=[...document.querySelectorAll('.cbtn')];
function setMode(m){mode=m;camBtns.forEach(b=>b.classList.toggle('on',b.dataset.mode===m));controls.enabled=(m==='orbit');if(m!=='orbit')tourU=0;}
camBtns.forEach(b=>b.addEventListener('click',()=>{tween=null;setMode(b.dataset.mode);}));
function tweenTo(pos,tgt){tween={t:0,dur:1.3,fromP:camera.position.clone(),toP:pos.clone(),fromT:controls.target.clone(),toT:tgt.clone()};setMode('orbit');}
function focusOn(target,dist){const dir=new THREE.Vector3().subVectors(camera.position,target).normalize();tweenTo(target.clone().add(dir.multiplyScalar(dist)),target);}
function easeIO(x){return x<0.5?2*x*x:1-Math.pow(-2*x+2,2)/2;}
document.getElementById('reset').addEventListener('click',()=>{ tweenTo(HOME_POS,HOME_TGT); });

/* ===== Picking ===== */
const ray=new THREE.Raycaster(),ndc=new THREE.Vector2();let downXY=null;
renderer.domElement.addEventListener('pointerdown',e=>{downXY=[e.clientX,e.clientY];});
renderer.domElement.addEventListener('pointerup',e=>{ if(!downXY)return;const moved=Math.hypot(e.clientX-downXY[0],e.clientY-downXY[1]);downXY=null;if(moved>6)return;
  ndc.x=(e.clientX/window.innerWidth)*2-1;ndc.y=-(e.clientY/window.innerHeight)*2+1;ray.setFromCamera(ndc,camera);
  const hits=ray.intersectObjects(propMeshes,false);if(!hits.length)return;const p=hits[0].object.userData.p;if(!p)return;
  openInfo(p); focusOn(new THREE.Vector3(p.x,p.h*0.55,p.z),Math.max(150,p.d*1.6+p.h*1.2)); });

/* ===== Info ===== */
const infoEl=document.getElementById('info');const SIDEN={W:'West side',E:'East side',C:'Median'};
function openInfo(p){ document.getElementById('info-title').textContent=p.n; const hex='#'+CATC[p.cat].toString(16).padStart(6,'0');
  document.getElementById('info-bar').style.background=hex; document.getElementById('info-kicker').textContent=CATN[p.cat]+' · '+SIDEN[p.side];
  document.getElementById('info-desc').textContent=p.note||'A Las Vegas Strip property. Full build coming soon.';
  const built=/memory bank/i.test(p.note||'')||p.sign;
  document.getElementById('info-facts').innerHTML=`<li><span>🧭</span>${SIDEN[p.side]} of Las Vegas Blvd</li><li><span>🏷️</span>${CATN[p.cat]}</li><li><span>📐</span>Footprint ${Math.round(p.w)}×${Math.round(p.d)} · height ${Math.round(p.h)}</li>`;
  const st=document.getElementById('info-status');
  if(p.sign){ st.textContent='✔ Built · live'; st.style.background='rgba(24,183,166,.2)';st.style.color='#7ff0d8'; }
  else if(built){ st.textContent='✔ Built · in memory bank'; st.style.background='rgba(24,183,166,.2)';st.style.color='#7ff0d8'; }
  else { st.textContent='◻ Placeholder · to build'; st.style.background='rgba(255,176,32,.18)';st.style.color='#ffd98a'; }
  infoEl.classList.add('open'); }
document.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click',()=>document.getElementById(b.dataset.close).classList.remove('open')));

/* ===== Sound ===== */
let audioCtx=null,audioOn=false,masterGain=null;
function initAudio(){const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return false;audioCtx=new AC();masterGain=audioCtx.createGain();masterGain.gain.value=0;masterGain.connect(audioCtx.destination);
  const fil=audioCtx.createBiquadFilter();fil.type='lowpass';fil.frequency.value=850;fil.Q.value=0.7;fil.connect(masterGain);
  [110,164.81,220,329.63].forEach((fr,i)=>{const o=audioCtx.createOscillator();o.type=i%2?'sine':'triangle';o.frequency.value=fr;o.detune.value=(i-1.5)*6;const gg=audioCtx.createGain();gg.gain.value=0.04;o.connect(gg);gg.connect(fil);o.start();});
  const bs=2*audioCtx.sampleRate,buf=audioCtx.createBuffer(1,bs,audioCtx.sampleRate),da=buf.getChannelData(0);for(let i=0;i<bs;i++)da[i]=(Math.random()*2-1)*0.5;
  const noise=audioCtx.createBufferSource();noise.buffer=buf;noise.loop=true;const nf=audioCtx.createBiquadFilter();nf.type='bandpass';nf.frequency.value=2200;nf.Q.value=0.6;const ng=audioCtx.createGain();ng.gain.value=0.014;noise.connect(nf);nf.connect(ng);ng.connect(masterGain);noise.start();
  const lfo=audioCtx.createOscillator();lfo.frequency.value=0.06;const lg=audioCtx.createGain();lg.gain.value=280;lfo.connect(lg);lg.connect(fil.frequency);lfo.start();return true;}
function toggleSound(){if(!audioCtx&&!initAudio())return;if(audioCtx.state==='suspended')audioCtx.resume();audioOn=!audioOn;const now=audioCtx.currentTime;masterGain.gain.cancelScheduledValues(now);masterGain.gain.setTargetAtTime(audioOn?0.85:0.0,now,0.6);const btn=document.getElementById('sound');btn.classList.toggle('on',audioOn);btn.textContent=audioOn?'🔊':'🔇';}
document.getElementById('sound').addEventListener('click',toggleSound);

/* ===== Post + resize ===== */
let composer,bloom;
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);if(composer)composer.setSize(window.innerWidth,window.innerHeight);});
composer=new THREE.EffectComposer(renderer); composer.addPass(new THREE.RenderPass(scene,camera));
bloom=new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight),0.7,0.8,0.62); composer.addPass(bloom);

/* ===== Animate ===== */
updateTime(timeOfDay);
const clock=new THREE.Clock();let elapsed=0;
function animate(){ requestAnimationFrame(animate); const dt=Math.min(clock.getDelta(),0.05); elapsed+=dt;
  for(let i=0;i<labels.length;i++) labels[i].quaternion.copy(camera.quaternion);
  disc.lookAt(camera.position);
  if(!REDUCE) for(let i=0;i<signUpdaters.length;i++) signUpdaters[i](elapsed);
  if(tween){ tween.t+=dt/tween.dur; const k=easeIO(Math.min(1,tween.t)); camera.position.lerpVectors(tween.fromP,tween.toP,k); controls.target.lerpVectors(tween.fromT,tween.toT,k); controls.update(); if(tween.t>=1)tween=null; }
  else if(mode==='fly'){ tourU=(tourU+dt*0.012)%1; const z=RZ0+tourU*RLEN; camera.position.set(Math.sin(elapsed*0.12)*120,240,z); camera.lookAt(0,40,z+320); }
  else if(mode==='limo'){ tourU=(tourU+dt*0.02)%1; const z=RZ0+tourU*RLEN; camera.position.set(CARR-LANE,6,z); camera.lookAt(CARR-LANE+Math.sin(elapsed*0.3)*10,9,z+120); }
  else controls.update();
  composer.render();
}
function boot(){ document.getElementById('loader').classList.add('hide'); animate(); const hint=document.getElementById('hint'); setTimeout(()=>hint.classList.add('show'),1400); setTimeout(()=>hint.classList.remove('show'),9500); }
setTimeout(boot,REDUCE?200:750);
})();
</script>
</body>
